# ========== General Spring Configuration ==========
spring.application.name=EstateManagementSystem

# ========== Thymeleaf Configuration ==========
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ========== Active Profile ==========
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mysql,local}

# ========== JPA Configuration ==========
spring.jpa.hibernate.ddl-auto=none

# ========== Email Configuration ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ========== VNPay Sandbox ==========
vnpay.tmn-code=9HMN0A2F
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
# return-url is override in each profile file (local/product)

# ========== Multipart ==========
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ========== Goong Maps API ==========
goong.api.key=${GOONG_API_KEY:}

# ========== JWT Authentication ==========
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration=15m
jwt.refresh-token-expiration=7d
jwt.cookie-secure=false

# ========== OAuth2 Login (Google) ==========
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email