<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SunTower | Quản lý Tòa nhà</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <!-- Slim Select: custom select dropdown với scrollbar -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slim-select@2/dist/slimselect.min.css">


    <style>
        body {
            background: #fafbfc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        main.content {
            padding: 2.5rem 3rem;
            margin-top: 70px;
        }

        /* Page header */
        .page-header {
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #111827;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-header h2 i {
            color: #3b82f6;
        }

        /* Modern button */
        .btn-add {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-add:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* ── Filter card compact ── */
        .filter-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.625rem;
            border-bottom: 1px solid #f3f4f6;
        }

        .filter-title {
            font-size: 0.9375rem;
            font-weight: 600;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .filter-title i { color: #3b82f6; font-size: 0.8rem; }

        .btn-toggle-filter {
            background: #f3f4f6;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-toggle-filter:hover { background: #e5e7eb; }
        .btn-toggle-filter i { transition: transform 0.25s ease; font-size: 0.75rem; }
        .btn-toggle-filter.collapsed i { transform: rotate(180deg); }

        .filter-body {
            max-height: 800px;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.25s ease;
            opacity: 1;
        }

        .filter-body.collapsed { max-height: 0; opacity: 0; }

        /* Section title nhỏ hơn */
        .filter-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.5rem;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .filter-section-title i { color: #3b82f6; }

        /* Form label compact */
        .filter-card .form-label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.3rem;
            display: block;
        }

        /* Input compact */
        .filter-card .form-control {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 0.35rem 0.625rem;
            font-size: 0.875rem;
            height: 32px;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #374151;
        }

        .filter-card .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .filter-card .form-control.has-value {
            background: #eff6ff !important;
            border-color: #3b82f6 !important;
            font-weight: 600;
        }

        /* SlimSelect wrapper khi có giá trị được chọn */
        .filter-card .ss-main.has-value {
            background: #eff6ff !important;
            border-color: #3b82f6 !important;
        }

        .filter-card .ss-main.has-value .placeholder {
            color: #1d4ed8 !important;
            font-weight: 600 !important;
        }

        /* Row gutter nhỏ */
        .filter-card .row { --bs-gutter-x: 0.625rem; --bs-gutter-y: 0.5rem; }
        .filter-card .mb-4 { margin-bottom: 0.625rem !important; }

        /* Range inputs compact */
        .range-inputs {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .range-inputs .form-control { flex: 1; min-width: 0; }

        .range-separator {
            color: #d1d5db;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        /* Filter actions */
        .filter-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 0.75rem;
            padding-top: 0.625rem;
            border-top: 1px solid #f3f4f6;
        }

        .btn-filter {
            padding: 0.3rem 0.875rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s ease;
            height: 32px;
        }

        .btn-filter.btn-reset  { background: #f3f4f6; color: #374151; }
        .btn-filter.btn-reset:hover { background: #e5e7eb; }
        .btn-filter.btn-search { background: #3b82f6; color: white; }
        .btn-filter.btn-search:hover { background: #2563eb; }

        /* Table card */
        .table-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }

        .table-card .table-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 600;
            color: #111827;
            font-size: 1rem;
            background: #fafbfc;
        }

        /* Modern table */
        .modern-table {
            margin: 0;
            min-height: 480px;
        }

        .modern-table thead th {
            background: #f9fafb;
            border: none;
            border-bottom: 1px solid #e5e7eb;
            padding: 0.875rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            height: 60px;
            /* Chiều cao cố định cho header */
        }

        .modern-table tbody {
            min-height: 420px;
            /* 5 dòng * 84px */
            display: table-row-group;
        }

        .modern-table tbody td {
            position: relative;
        }

        .modern-table tbody tr {
            height: 84px;
            min-height: 84px;
        }

        .modern-table tbody tr:last-child td {
            border-bottom: none;
        }

        .modern-table tbody tr {
            transition: background 0.15s ease;
        }

        .modern-table tbody tr:hover {
            background: #f9fafb;
        }

        /* Đảm bảo table-responsive không ảnh hưởng min-height */
        .table-responsive {
            min-height: 480px;
        }

        /* Table badges and cells */
        .building-name {
            font-weight: 600;
            color: #111827;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            max-height: 2.8em;
        }

        .building-id {
            color: #6b7280;
            font-weight: 500;
            white-space: nowrap;
        }

        .price-badge,
        .level-badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.875rem;
            white-space: nowrap;
        }

        .price-badge {
            background: #ecfdf5;
            color: #059669;
        }

        .level-badge {
            background: #eff6ff;
            color: #2563eb;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .btn-action {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 6px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        .btn-action.btn-view {
            background: #eff6ff;
            color: #2563eb;
        }

        .btn-action.btn-view:hover {
            background: #dbeafe;
            transform: translateY(-1px);
        }

        .btn-action.btn-edit {
            background: #fffbeb;
            color: #d97706;
        }

        .btn-action.btn-edit:hover {
            background: #fef3c7;
            transform: translateY(-1px);
        }

        .btn-action.btn-delete {
            background: #fef2f2;
            color: #dc2626;
        }

        .btn-action.btn-delete:hover {
            background: #fee2e2;
            transform: translateY(-1px);
        }

        /* Empty state */
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #9ca3af;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .empty-state i {
            font-size: 3rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }

        .empty-state p {
            margin: 0;
            font-size: 0.875rem;
        }

        /* Pagination */
        .pagination-wrapper {
            min-height: auto;
            margin-top: 1.5rem;
        }

        .pagination {
            gap: 0.5rem;
        }

        .pagination .page-item {
            margin: 0;
        }

        .pagination .page-link {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 0.5rem 0.875rem;
            color: #374151;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .pagination .page-link:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            color: #111827;
        }

        .pagination .page-item.active .page-link {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .pagination .page-item.disabled .page-link {
            background: #f9fafb;
            border-color: #e5e7eb;
            color: #d1d5db;
        }

        /* Placeholder row khi đang loading */
        .loading-row td {
            text-align: center;
            color: #9ca3af;
            font-style: italic;
            height: 84px;
        }

        /* Contact info */
        .contact-info {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            flex-wrap: wrap;
            line-height: 1.5;
        }

        .contact-info i {
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            main.content {
                margin-left: 0;
                padding: 1.5rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .action-buttons {
                flex-wrap: wrap;
            }
        }


        /* ── Slim Select override — khớp với filter-card compact ── */
        .ss-main {
            height: 32px !important;
            min-height: 32px !important;
            border: 1px solid #e5e7eb !important;
            border-radius: 6px !important;
            font-size: 0.875rem !important;
            color: #374151 !important;
            background: #fff !important;
            padding: 0 0.625rem !important;
            cursor: pointer;
        }

        .ss-main:focus, .ss-main.ss-open-below, .ss-main.ss-open-above {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.1) !important;
            outline: none !important;
        }

        .ss-main .ss-single-selected {
            height: 30px !important;
            line-height: 30px !important;
        }

        .ss-main .placeholder {
            color: #9ca3af !important;
            font-size: 0.875rem !important;
        }

        /* Dropdown list */
        .ss-content {
            border: 1px solid #e5e7eb !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1) !important;
            overflow: hidden !important;
            z-index: 9999 !important;
        }

        .ss-search {
            padding: 0.4rem 0.5rem !important;
            border-bottom: 1px solid #f3f4f6 !important;
        }

        .ss-search input {
            border: 1px solid #e5e7eb !important;
            border-radius: 5px !important;
            font-size: 0.78rem !important;
            padding: 0.25rem 0.5rem !important;
            height: 26px !important;
        }

        .ss-list {
            max-height: 180px !important;
            overflow-y: auto !important;
        }

        /* Scrollbar trong list */
        .ss-list::-webkit-scrollbar { width: 4px; }
        .ss-list::-webkit-scrollbar-track { background: #f9fafb; }
        .ss-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        .ss-list::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        .ss-option {
            padding: 0.3rem 0.625rem !important;
            font-size: 0.875rem !important;
            color: #374151 !important;
            cursor: pointer;
        }

        .ss-option:hover, .ss-option.ss-highlighted {
            background: rgba(59,130,246,0.08) !important;
            color: #1d4ed8 !important;
        }

        .ss-option.ss-selected {
            background: rgba(59,130,246,0.12) !important;
            color: #1d4ed8 !important;
            font-weight: 600 !important;
        }

        /* has-value state */
        .ss-main.has-value {
            background: #eff6ff !important;
            border-color: #3b82f6 !important;
        }

        .ss-main.has-value .ss-single-selected { font-weight: 600 !important; }

        /* Arrow icon */
        .ss-arrow { opacity: 0.5; }


        /* ── Property type & Transaction badges ── */
        .property-type-badge,
        .transaction-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.625rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        /* Property type colors */
        .prop-office    { background: #eff6ff; color: #1d4ed8; }
        .prop-shophouse { background: #fef3c7; color: #92400e; }
        .prop-apartment { background: #f0fdf4; color: #166534; }
        .prop-warehouse { background: #fdf4ff; color: #7e22ce; }

        /* Transaction type colors */
        .tx-for_rent { background: #f0f9ff; color: #0369a1; }
        .tx-for_sale { background: #fff7ed; color: #c2410c; }

    </style>
</head>

<body>

<!-- HEADER + SIDEBAR -->
<div th:replace="~{layout/header :: header}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="content">
    <div class="container-fluid">
        <!-- Page Header -->
        <div class="page-header">
            <h2>
                <i class="bi bi-building"></i>
                Quản lý bất động sản
            </h2>
            <a th:href="@{/admin/building/add}" class="btn-add">
                <i class="bi bi-plus-circle"></i>
                Thêm tòa nhà
            </a>
        </div>

        <!-- Filter Card -->
        <form class="filter-card" th:action="@{/admin/building/search}" method="get">
            <div class="filter-header">
                <div class="filter-title">
                    <i class="bi bi-funnel"></i>
                    Bộ lọc tìm kiếm
                </div>
                <button type="button" class="btn-toggle-filter" onclick="toggleFilter()">
                    <i class="bi bi-chevron-up" id="toggleIcon"></i>
                </button>
            </div>

            <div class="filter-body" id="filterBody">
                <!-- Thông tin cơ bản -->
                <div class="filter-section-title">
                    <i class="bi bi-info-circle"></i> Thông tin cơ bản
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label class="form-label">Tên tòa nhà</label>
                        <input type="text" class="form-control" name="name" placeholder="VD: Sun Tower">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Khu vực</label>
                        <select class="form-control" name="districtId">
                            <option value="">-- Tất cả --</option>
                            <option th:each="d : ${districts}" th:value="${d.getValue()}" th:text="${d.getKey()}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Loại hình BĐS</label>
                        <select class="form-control" name="propertyType">
                            <option value="">-- Tất cả --</option>
                            <option th:each="pt : ${propertyTypes}"
                                    th:value="${pt.name()}"
                                    th:text="${pt.label}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Loại giao dịch</label>
                        <select class="form-control" name="transactionType">
                            <option value="">-- Tất cả --</option>
                            <option th:each="tt : ${transactionTypes}"
                                    th:value="${tt.name()}"
                                    th:text="${tt.label}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Đặc điểm tòa nhà -->
                <div class="filter-section-title">
                    <i class="bi bi-building"></i> Đặc điểm tòa nhà
                </div>
                <div class="row mb-4">
                    <div class="col-md-2">
                        <label class="form-label">Số tầng</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="numberOfFloorFrom" placeholder="Từ"
                                   min="0">
                            <span class="range-separator">-</span>
                            <input type="number" class="form-control" name="numberOfFloorTo" placeholder="Đến"
                                   min="0">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Số tầng hầm</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="numberOfBasementFrom" placeholder="Từ"
                                   min="0">
                            <span class="range-separator">-</span>
                            <input type="number" class="form-control" name="numberOfBasementTo" placeholder="Đến"
                                   min="0">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Diện tích sàn (m²)</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="floorAreaFrom" placeholder="Từ" min="0">
                            <span class="range-separator">-</span>
                            <input type="number" class="form-control" name="floorAreaTo" placeholder="Đến" min="0">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Diện tích thuê (m²)</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="rentAreaFrom" placeholder="Từ" min="0">
                            <span class="range-separator">-</span>
                            <input type="number" class="form-control" name="rentAreaTo" placeholder="Đến" min="0">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Hướng</label>
                        <select class="form-control" name="direction">
                            <option value="">-- Chọn hướng --</option>
                            <option th:each="d : ${directions}" th:value="${d.name()}" th:text="${d.label}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Hạng</label>
                        <select class="form-control" name="level">
                            <option value="">-- Chọn hạng --</option>
                            <option th:each="l : ${levels}" th:value="${l.name()}" th:text="${l.label}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Nhân viên quản lý</label>
                        <select class="form-control" name="staffId">
                            <option value="">-- Tất cả --</option>
                            <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.fullName}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Giá và phí -->
                <div class="filter-section-title">
                    <i class="bi bi-cash-stack"></i> Giá và phí (VNĐ)
                </div>
                <div class="row">
                    <div class="col-md-2">
                        <label class="form-label">Giá thuê</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="rentPriceFrom" placeholder="Từ" min="0">
                            <span class="range-separator">-</span>
                            <input type="number" class="form-control" name="rentPriceTo" placeholder="Đến" min="0">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Phí dịch vụ</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="serviceFeeFrom" placeholder="Từ"
                                   min="0">
                            <span class="range-separator">-</span>
                            <input type="number" class="form-control" name="serviceFeeTo" placeholder="Đến" min="0">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Phí xe ô tô</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="carFeeFrom" placeholder="Từ" min="0">
                            <span class="range-separator">-</span>
                            <input type="number" class="form-control" name="carFeeTo" placeholder="Đến" min="0">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Phí xe máy</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="motorbikeFeeFrom" placeholder="Từ"
                                   min="0">

<script>
    function toggleFilter() {
        const filterBody = document.getElementById('filterBody');
        const toggleBtn = document.querySelector('.btn-toggle-filter');
        const toggleIcon = document.getElementById('toggleIcon');

        filterBody.classList.toggle('collapsed');
        toggleBtn.classList.toggle('collapsed');

        // Lưu trạng thái vào localStorage
        const isCollapsed = filterBody.classList.contains('collapsed');
        localStorage.setItem('filterCollapsed', isCollapsed);
    }

    // Khôi phục trạng thái khi tải trang
    document.addEventListener('DOMContentLoaded', function () {
        const filterBody = document.getElementById('filterBody');
        const toggleBtn = document.querySelector('.btn-toggle-filter');
        const isCollapsed = localStorage.getItem('filterCollapsed') === 'true';

        if (isCollapsed) {
            filterBody.classList.add('collapsed');
            toggleBtn.classList.add('collapsed');
        }
    });
</script>

<script>
    let currentPage = 1;
    const pageSize = 5;
    const levelLabels = {
        A_PLUS: "A+", A: "A", B_PLUS: "B+", B: "B", C_PLUS: "C+", C: "C"
    };

    const propertyLabels = {
        OFFICE: "Văn phòng", SHOPHOUSE: "Shophouse",
        APARTMENT: "Căn hộ", WAREHOUSE: "Kho xưởng"
    };

    const transactionLabels = {
        FOR_RENT: "Cho thuê", FOR_SALE: "Mua bán"
    };

    function formatPrice(price) {
        if (price == null) return '';
        return new Intl.NumberFormat('vi-VN')
            .format(price)
            .replaceAll('.', ',') + ' đ';
    }

    // Hàm load dữ liệu bảng tòa nhà bằng Ajax
    function loadBuildings(page, event) {
        if (event) event.preventDefault();

        $.ajax({
            url: "/admin/building/list/page",
            type: "GET",
            data: { page: page, size: pageSize },
            success: function (data) {
                currentPage = page;
                const tbody = $("#buildingTableBody");
                tbody.empty();

                if (data.content.length === 0) {
                    tbody.append(`<tr><td colspan="7" class="text-center text-muted">Không có dữ liệu</td></tr>`);
                    $("#pagination").empty();
                    return;
                }

                $.each(data.content, function (i, b) {
                    tbody.append(`
                    <tr>
                        <td>${b.id}</td>
                        <td><span class="building-name">${b.name}</span></td>
                        <td>${b.address}</td>
                        <td><span class="level-badge">${levelLabels[b.level] || ''}</span></td>
                        <td><span class="property-type-badge prop-${(b.propertyType||'').toLowerCase()}">${propertyLabels[b.propertyType] || b.propertyType || ''}</span></td>
                        <td><span class="transaction-badge tx-${(b.transactionType||'').toLowerCase()}">${transactionLabels[b.transactionType] || b.transactionType || ''}</span></td>
                        <td>
                            <div class="action-buttons">
                                <a href="/admin/building/${b.id}" class="btn-action btn-view" title="Xem chi tiết">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a href="/admin/building/edit/${b.id}" class="btn-action btn-edit" title="Chỉnh sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a href="#" title="Xóa" class="btn-action btn-delete" data-id="${b.id}">
                                   <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                `);
                });

                renderPagination(data.totalPages, page);
            },
            error: function () {
                alert("Không tải được dữ liệu!");
            }
        });
    }

    // Hàm render phân trang Bootstrap
    function renderPagination(totalPages, current) {
        const pagination = $("#pagination");
        pagination.empty();

        if (totalPages <= 1) return;

        let html = `
        <nav class="pagination-wrapper mt-3">
            <ul class="pagination justify-content-center">
    `;

        // Nút "First"
        html += `
    <li class="page-item ${current === 1 ? 'disabled' : ''}">
        <a href="#" class="page-link" onclick="loadBuildings(1, event)">First</a>
    </li>
    `;

        // Nút "Previous"
        html += `
        <li class="page-item ${current === 1 ? 'disabled' : ''}">
            <a href="#" class="page-link" onclick="loadBuildings(${current - 1}, event)">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
    `;

        // Các trang số
        const blockSize = 5;
        const blockStart = Math.floor((current - 1) / blockSize) * blockSize + 1;
        let blockEnd = blockStart + blockSize - 1;
        if (blockEnd > totalPages) blockEnd = totalPages;

        for (let i = blockStart; i <= blockEnd; i++) {
            html += `
            <li class="page-item ${i === current ? 'active' : ''}">
                <a href="#" class="page-link" onclick="loadBuildings(${i}, event)">${i}</a>
            </li>
        `;
        }

        // Nút "Next"
        html += `
        <li class="page-item ${current === totalPages ? 'disabled' : ''}">
            <a href="#" class="page-link" onclick="loadBuildings(${current + 1}, event)">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
    `;

        // Nút "Last"
        html += `
        <li class="page-item ${current === totalPages ? 'disabled' : ''}">
            <a href="#" class="page-link" onclick="loadBuildings(${totalPages}, event)">Last</a>
        </li>
    `;

        html += `
            </ul>
        </nav>
    `;

        pagination.html(html);
    }

    // Khi trang load, gọi Ajax lần đầu
    $(document).ready(function () {
        loadBuildings(1);
        // Hàm highlight trường có giá trị
        function highlightFilledInputs() {
            $('.filter-card .form-control').each(function () {
                const $input = $(this);
                if ($input.val() && $input.val().trim() !== '') {
                    $input.addClass('has-value');
                } else {
                    $input.removeClass('has-value');
                }
            });
        }

        // Highlight các trường đã có giá trị khi load trang
        highlightFilledInputs();

        // Lắng nghe sự kiện input/change để highlight real-time
        $('.filter-card .form-control').on('input change', function () {
            const $this = $(this);
            if ($this.val() && $this.val().trim() !== '') {
                $this.addClass('has-value');
            } else {
                $this.removeClass('has-value');
            }
        });

        // Reset highlight khi reset form
        $('.btn-filter.btn-reset').on('click', function () {
            setTimeout(function () {
                $('.filter-card .form-control').removeClass('has-value');
            }, 10);
        });
    });

    // Ajax xóa tòa nhà
    $(document).on("click", ".btn-delete", function (e) {
        e.preventDefault();

        let id = $(this).data("id");

        Swal.fire({
            title: 'Xác nhận xóa',
            text: "Bạn có chắc muốn xóa tòa nhà này?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Xóa',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: "/admin/building/delete/" + id,
                    type: "DELETE",
                    success: function () {
                        Swal.fire({
                            icon: 'success',
                            title: 'Thành công',
                            text: 'Xóa tòa nhà thành công!',
                            timer: 1500,       // tự động đóng sau 1.5s
                            showConfirmButton: false
                        }).then(() => {
                            window.location.href = "/admin/building/list";
                        });
                    },
                    error: function (xhr) {
                        const err = xhr.responseJSON;
                        if (err && err.message) {
                            Swal.fire({
                                icon: 'error',
                                title: 'Lỗi',
                                text: err.message
                            });
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'Lỗi',
                                text: 'Xóa thất bại!'
                            });
                        }
                    }
                });
            }
        })
    });
</script>
<script>
    document.addEventListener('DOMContentLoaded', function () {

        // SlimSelect render .ss-main ngay SAU <select> trong DOM,
        // nhưng vị trí có thể thay đổi. Cách đáng tin cậy nhất:
        // lưu reference instance → lấy .main từ instance.
        const slimInstances = new Map(); // el → SlimSelect instance

        function getSsMain(el) {
            const inst = slimInstances.get(el);
            if (inst && inst.main) return inst.main.main; // SlimSelect v2: inst.main.main = .ss-main div
            // Fallback: tìm trong parent bằng class
            const parent = el.closest('.col-md-2, .col-md-3, .filter-card') || el.parentElement;
            return parent ? parent.querySelector('.ss-main') : null;
        }

        function syncHasValue(el) {
            const ssMain = getSsMain(el);
            const hasVal = el.value && el.value !== '';
            if (ssMain) {
                ssMain.classList.toggle('has-value', hasVal);
            }
        }

        // Khởi tạo SlimSelect
        document.querySelectorAll('.filter-card select').forEach(function (el) {
            const inst = new SlimSelect({
                select: el,
                settings: {
                    showSearch: el.options.length > 6,
                    searchPlaceholder: 'Tìm kiếm...',
                    searchText: 'Không có kết quả',
                    allowDeselect: false,
                },
                events: {
                    afterChange: function () {
                        syncHasValue(el);
                    }
                }
            });
            slimInstances.set(el, inst);
            // Sync trạng thái ban đầu sau khi SlimSelect render xong
            setTimeout(function () { syncHasValue(el); }, 0);
        });

        // Reset button: clear SlimSelect + input + has-value
        const resetBtn = document.querySelector('.btn-filter.btn-reset');
        if (resetBtn) {
            resetBtn.addEventListener('click', function () {
                slimInstances.forEach(function (inst, el) {
                    inst.setSelected('');
                    const ssMain = getSsMain(el);
                    if (ssMain) ssMain.classList.remove('has-value');
                });
                setTimeout(function () {
                    document.querySelectorAll('.filter-card input').forEach(function (el) {
                        el.value = '';
                        el.classList.remove('has-value');
                    });
                }, 10);
            });
        }
    });
</script>
