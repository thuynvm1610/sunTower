<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SunTower | Thêm Hợp đồng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        main.content {
            margin-left: 220px;
            padding: 0;
            margin-top: 72px;
        }

        /* ══ PAGE BODY ══════════════════════════════════════════════════════ */
        .detail-body {
            padding: 1.5rem;
        }

        /* ══ PAGE HEADER ════════════════════════════════════════════════════ */
        .page-header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .page-header-bar h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #111827;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-header-bar h2 i {
            color: #3b82f6;
            font-size: 1.2rem;
        }

        .page-header-bar .update-time {
            font-size: 0.8125rem;
            color: #9ca3af;
            margin-top: 0.2rem;
        }

        /* ══ BACK BUTTON ════════════════════════════════════════════════════ */
        .btn-back {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8125rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            text-decoration: none;
            flex-shrink: 0;
        }

        .btn-back:hover {
            background: #f9fafb;
            color: #111827;
            border-color: #d1d5db;
            transform: translateY(-1px);
        }

        /* ══ D-CARD (giống list) ════════════════════════════════════════════ */
        .d-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-bottom: 1.25rem;
        }

        .d-card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            background: #fafbfc;
            border-radius: 10px 10px 0 0;
        }

        .d-card-header i {
            font-size: 0.9375rem;
            color: #3b82f6;
        }

        .d-card-header h3 {
            font-size: 0.875rem;
            font-weight: 700;
            color: #111827;
            margin: 0;
        }

        .d-card-body {
            padding: 1.25rem 1.5rem;
        }

        /* ══ SECTION TITLE (giống filter-section-title) ═════════════════════ */
        .form-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.875rem;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .form-section-title i {
            color: #3b82f6;
            font-size: 0.8rem;
        }

        /* ══ FORM CONTROLS ══════════════════════════════════════════════════ */
        .form-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
            display: block;
        }

        .required {
            color: #ef4444;
            margin-left: 0.2rem;
        }

        .form-control,
        .form-select {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.5rem 0.75rem;
            font-size: 0.8125rem;
            color: #374151;
            background: #fff;
            transition: all 0.2s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        .form-control:disabled,
        .form-select:disabled {
            background-color: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }

        /* ══ INPUT GROUP ════════════════════════════════════════════════════ */
        .input-group-text {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-right: none;
            color: #6b7280;
            font-size: 0.8125rem;
            font-weight: 500;
            border-radius: 7px 0 0 7px;
        }

        .input-group .form-control,
        .input-group .form-select {
            border-left: none;
            border-radius: 0 7px 7px 0;
        }

        .input-group:focus-within .input-group-text {
            border-color: #3b82f6;
            background: #eff6ff;
            color: #3b82f6;
        }

        /* ══ HELPER TEXT ════════════════════════════════════════════════════ */
        .form-text {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.3rem;
        }

        .form-text.info {
            color: #3b82f6;
            font-weight: 500;
        }

        /* ══ INFO BOX ═══════════════════════════════════════════════════════ */
        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .info-box i {
            color: #3b82f6;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .info-box-content {
            font-size: 0.8125rem;
            color: #1e40af;
            line-height: 1.5;
        }



        /* ══ DATE VALIDATION ════════════════════════════════════════════════ */
        .date-validation {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            font-weight: 600;
        }

        .date-validation.valid  { color: #10b981; }
        .date-validation.invalid { color: #ef4444; }

        /* ══ DIVIDER ════════════════════════════════════════════════════════ */
        .section-divider {
            border: none;
            border-top: 1px solid #f3f4f6;
            margin: 1.25rem 0;
        }

        /* ══ FORM ACTIONS ═══════════════════════════════════════════════════ */
        .form-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
        }

        .btn-filter {
            padding: 0.45rem 1rem;
            border-radius: 7px;
            font-weight: 600;
            font-size: 0.8125rem;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-filter.btn-reset {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-filter.btn-reset:hover { background: #e5e7eb; }

        .btn-filter.btn-submit {
            background: #3b82f6;
            color: white;
        }

        .btn-filter.btn-submit:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(59, 130, 246, 0.3);
        }

        /* ══ RESPONSIVE ═════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            main.content { margin-left: 0; }
            .page-header-bar { flex-direction: column; align-items: flex-start; }
            .form-actions { flex-direction: column; }
            .btn-filter { width: 100%; justify-content: center; }
        }
    </style>
</head>

<body>

<!-- HEADER + SIDEBAR -->
<div th:replace="~{layout/header :: header}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="content">
    <div class="detail-body">

        <!-- ── Page Header ─────────────────────────────────────────────── -->
        <div class="page-header-bar">
            <div>
                <h2>
                    <i class="bi bi-file-earmark-plus"></i>
                    Thêm hợp đồng mới
                </h2>
                <div class="update-time">Điền thông tin để tạo hợp đồng cho thuê mới</div>
            </div>
            <a th:href="@{/admin/contract/list}" class="btn-back">
                <i class="bi bi-arrow-left"></i>
                Quay lại danh sách
            </a>
        </div>

        <!-- ── Info Box ────────────────────────────────────────────────── -->
        <div class="info-box">
            <i class="bi bi-info-circle"></i>
            <div class="info-box-content">
                Vui lòng điền đầy đủ thông tin bắt buộc (<span style="color:#ef4444;font-weight:700;">*</span>) để thêm hợp đồng mới vào hệ thống.
            </div>
        </div>

        <!-- ── Form Card ───────────────────────────────────────────────── -->
        <div class="d-card">
            <div class="d-card-header">
                <i class="bi bi-file-earmark-text"></i>
                <h3>Thông tin hợp đồng</h3>
            </div>

            <form id="contractForm">
                <div class="d-card-body">

                    <!-- Thông tin cơ bản -->
                    <div class="form-section-title">
                        <i class="bi bi-building"></i> Thông tin cơ bản
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Tòa nhà <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-building"></i></span>
                                <select class="form-select" name="buildingId" id="buildingSelect" required>
                                    <option value="">-- Chọn tòa nhà --</option>
                                    <option th:each="building : ${buildings}" th:value="${building.value}"
                                            th:text="${building.key}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Diện tích thuê (m²) <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-rulers"></i></span>
                                <select class="form-select" name="rentArea" id="rentAreaSelect" required disabled>
                                    <option value="">-- Chọn tòa nhà trước --</option>
                                </select>
                            </div>
                            <small class="form-text info" id="rentAreaInfo"></small>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Khách hàng <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <select class="form-select" name="customerId" required>
                                    <option value="">-- Chọn khách hàng --</option>
                                    <option th:each="customer : ${customers}" th:value="${customer.value}"
                                            th:text="${customer.key}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Nhân viên phụ trách <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <select class="form-select" name="staffId" required>
                                    <option value="">-- Chọn nhân viên --</option>
                                    <option th:each="staff : ${staffs}" th:value="${staff.id}"
                                            th:text="${staff.fullName}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Giá thuê (VNĐ) <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                                <input type="number" class="form-control" name="rentPrice"
                                       placeholder="VD: 10000000" required step="1000">
                            </div>
                            <small class="form-text">Nhập giá thuê theo tháng</small>
                        </div>
                    </div>

                    <hr class="section-divider">

                    <!-- Thời gian hợp đồng -->
                    <div class="form-section-title">
                        <i class="bi bi-calendar-range"></i> Thời gian hợp đồng
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Ngày bắt đầu <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar-check"></i></span>
                                <input type="date" class="form-control" name="startDate" required
                                       id="startDateInput">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Ngày kết thúc <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar-x"></i></span>
                                <input type="date" class="form-control" name="endDate" required id="endDateInput">
                            </div>
                            <small class="date-validation" id="dateValidation"></small>
                        </div>
                    </div>

                    <!-- Hidden status mặc định ACTIVE -->
                    <input type="hidden" name="status" value="ACTIVE">

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="reset" class="btn-filter btn-reset" onclick="resetForm()">
                            <i class="bi bi-arrow-clockwise"></i> Reset
                        </button>
                        <button type="submit" class="btn-filter btn-submit">
                            <i class="bi bi-check-circle"></i> Lưu hợp đồng
                        </button>
                    </div>

                </div><!-- /d-card-body -->
            </form>
        </div><!-- /d-card -->

    </div><!-- /detail-body -->
</main>

<!--Bootstrap-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- CDN SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!--JQuery-->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script th:inline="javascript">
    // Lấy dữ liệu rentAreas từ Thymeleaf
    const rentAreasData = /*[[${rentAreas}]]*/ {};

    // Xử lý thay đổi tòa nhà
    $(document).ready(function () {
        $('#buildingSelect').on('change', function () {
            const buildingId = $(this).val();
            const $rentAreaSelect = $('#rentAreaSelect');
            const $rentAreaInfo = $('#rentAreaInfo');

            // Reset dropdown diện tích
            $rentAreaSelect.empty();
            $rentAreaInfo.text('');

            if (!buildingId) {
                $rentAreaSelect.append('<option value="">-- Chọn tòa nhà trước --</option>');
                $rentAreaSelect.prop('disabled', true);
                $rentAreaSelect.removeClass('has-value');
                return;
            }

            // Lấy danh sách diện tích của tòa nhà
            const areas = rentAreasData[buildingId];

            if (!areas || areas.length === 0) {
                $rentAreaSelect.append('<option value="">-- Không có diện tích khả dụng --</option>');
                $rentAreaSelect.prop('disabled', true);
                $rentAreaInfo.text('Tòa nhà này chưa có diện tích nào khả dụng');
                return;
            }

            // Thêm options
            $rentAreaSelect.append('<option value="">-- Chọn diện tích --</option>');
            areas.forEach(function (area) {
                $rentAreaSelect.append(`<option value="${area}">${area} m²</option>`);
            });

            $rentAreaSelect.prop('disabled', false);
            $rentAreaInfo.text(`Có ${areas.length} diện tích khả dụng cho tòa nhà này`);
        });

        // Trigger highlight khi chọn diện tích
        $('#rentAreaSelect').on('change', function () {
            // no-op: has-value removed
        });
    });
</script>

<script>
    // Date validation
    function validateDateRange() {
        const startDate = document.getElementById('startDateInput').value;
        const endDate = document.getElementById('endDateInput').value;
        const validation = document.getElementById('dateValidation');

        if (!startDate || !endDate) {
            validation.textContent = '';
            return true;
        }

        const start = new Date(startDate);
        const end = new Date(endDate);

        if (end <= start) {
            validation.className = 'date-validation invalid';
            validation.textContent = 'Ngày kết thúc phải sau ngày bắt đầu';
            return false;
        } else {
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            validation.className = 'date-validation valid';
            validation.textContent = `Thời hạn hợp đồng: ${diffDays} ngày`;
            return true;
        }
    }

    document.getElementById('startDateInput').addEventListener('change', validateDateRange);
    document.getElementById('endDateInput').addEventListener('change', validateDateRange);

    // Status card selection - removed (default ACTIVE on add)

    function resetForm() {
        // Reset date validation
        const validation = document.getElementById('dateValidation');
        validation.textContent = '';

        // Reset rent area
        const $rentAreaSelect = $('#rentAreaSelect');
        $rentAreaSelect.empty().append('<option value="">-- Chọn tòa nhà trước --</option>');
        $rentAreaSelect.prop('disabled', true);
        $('#rentAreaInfo').text('');
    }
</script>

<script>
    $("#contractForm").on("submit", function (e) {
        e.preventDefault();

        // Validate date range
        if (!validateDateRange()) {
            Swal.fire({
                icon: 'warning',
                title: 'Cảnh báo',
                text: 'Ngày kết thúc phải sau ngày bắt đầu!'
            });
            return;
        }

        const data = {
            buildingId: $("[name='buildingId']").val(),
            customerId: $("[name='customerId']").val(),
            staffId: $("[name='staffId']").val(),
            rentArea: $("[name='rentArea']").val(),
            rentPrice: $("[name='rentPrice']").val(),
            startDate: $("[name='startDate']").val(),
            endDate: $("[name='endDate']").val(),
            status: $("[name='status']:checked").val()
        };

        $.ajax({
            url: "/admin/contract/add",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(data),

            success: function () {
                Swal.fire({
                    icon: 'success',
                    title: 'Thành công',
                    text: 'Thêm hợp đồng thành công!',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = "/admin/contract/list";
                });
            },
            error: function (xhr) {
                const err = xhr.responseJSON;
                if (err && err.message) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Lỗi',
                        text: err.message
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Lỗi',
                        text: 'Thêm thất bại!'
                    });
                }
            }
        });
    });

    $(document).ready(function () {
        // Reset highlight khi reset form
        $('.btn-reset').on('click', function () {
            setTimeout(function () {
                $('.form-control, .form-select').removeClass('has-value');
            }, 10);
        });
    });
</script>
</body>

</html>
