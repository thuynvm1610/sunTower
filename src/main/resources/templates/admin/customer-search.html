<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SunTower | Kết quả tìm kiếm khách hàng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">

    <style>
        body {
            background: #fafbfc;
            overflow-x: hidden;
        }

        main.content {
            margin-left: 220px;
            padding: 1.5rem 1.5rem;
            margin-top: 72px;
        }

        /* ══ PAGE HEADER ════════════════════════════════════════════════════ */
        .page-header {
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #111827;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-header h2 i {
            color: #3b82f6;
            font-size: 1.2rem;
        }

        .page-header .update-time {
            font-size: 0.8125rem;
            color: #9ca3af;
            margin-top: 0.2rem;
        }

        /* ══ BUTTONS ════════════════════════════════════════════════════════ */
        .btn-back {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-back:hover {
            background: #f9fafb;
            color: #111827;
            border-color: #d1d5db;
            transform: translateY(-1px);
        }

        /* ══ FILTER CARD ════════════════════════════════════════════════════ */
        .filter-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0;
            overflow: hidden;
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            transition: border-color 0.2s ease;
        }

        .filter-card:has(.filter-body.collapsed) .filter-header {
            border-bottom-color: transparent;
        }

        .filter-title {
            font-size: 0.8125rem;
            font-weight: 700;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-title i {
            color: #3b82f6;
            font-size: 0.875rem;
        }

        .btn-toggle-filter {
            background: #f3f4f6;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #6b7280;
            font-size: 0.75rem;
        }

        .btn-toggle-filter:hover {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-toggle-filter i {
            transition: transform 0.3s;
        }

        .btn-toggle-filter.collapsed i {
            transform: rotate(180deg);
        }

        .filter-body {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 1;
            padding: 1.25rem 1.5rem;
        }

        .filter-body.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .filter-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .filter-section-title i {
            color: #3b82f6;
            font-size: 0.8rem;
        }

        /* Form controls */
        .filter-card .form-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
            display: block;
        }

        .filter-card .form-control {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.5rem 0.75rem;
            font-size: 0.8125rem;
            color: #374151;
            background: #fff;
            transition: all 0.2s;
            height: auto;
        }

        .filter-card .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .filter-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
        }

        .btn-filter {
            padding: 0.45rem 1rem;
            border-radius: 7px;
            font-weight: 600;
            font-size: 0.8125rem;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-filter.btn-reset {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-filter.btn-reset:hover { background: #e5e7eb; }

        .btn-filter.btn-search {
            background: #3b82f6;
            color: white;
        }

        .btn-filter.btn-search:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(59,130,246,0.3);
        }

        /* ══ RESULT BADGE ════════════════════════════════════════════════════ */
        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #eff6ff;
            color: #2563eb;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        /* ══ TABLE CARD ══════════════════════════════════════════════════════ */
        .table-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .table-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            background: #fafbfc;
            border-radius: 10px 10px 0 0;
        }

        .table-header-row .thr-title {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.875rem;
            font-weight: 700;
            color: #111827;
        }

        .table-header-row .thr-title i {
            color: #3b82f6;
            font-size: 0.9375rem;
        }

        /* ══ TABLE ═══════════════════════════════════════════════════════════ */
        .table-responsive {
            min-height: unset;
        }

        .modern-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .modern-table thead th {
            background: #f8fafc;
            border: none;
            border-bottom: 1.5px solid #e9ecef;
            padding: 0.5rem 0.875rem;
            font-size: 0.68rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .modern-table tbody td {
            padding: 0.75rem 0.875rem;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
            vertical-align: middle;
            font-size: 0.8125rem;
        }

        .modern-table tbody tr:last-child td { border-bottom: none; }

        .modern-table tbody tr {
            transition: background 0.15s;
        }

        .modern-table tbody tr:hover {
            background: #f0f9ff;
        }

        /* ══ TABLE CELL STYLES ═══════════════════════════════════════════════ */
        .customer-id {
            font-weight: 700;
            color: #111827;
            font-size: 0.8125rem;
        }

        .customer-name {
            font-weight: 600;
            color: #111827;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            max-height: 2.8em;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.775rem;
            color: #6b7280;
        }

        .contact-info i {
            font-size: 0.7rem;
            color: #9ca3af;
        }

        /* ══ ACTION BUTTONS ═══════════════════════════════════════════════════ */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .btn-action {
            width: 30px;
            height: 30px;
            padding: 0;
            border-radius: 7px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.8rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .btn-action.btn-view  { background: #eff6ff; color: #2563eb; }
        .btn-action.btn-view:hover  { background: #dbeafe; transform: translateY(-1px); }

        .btn-action.btn-delete { background: #fef2f2; color: #dc2626; }
        .btn-action.btn-delete:hover { background: #fee2e2; transform: translateY(-1px); }

        /* ══ EMPTY STATE ══════════════════════════════════════════════════════ */
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #9ca3af;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .empty-state i {
            font-size: 2.5rem;
            color: #d1d5db;
            margin-bottom: 1rem;
        }

        .empty-state p {
            margin: 0;
            font-size: 0.875rem;
        }

        /* ══ PAGINATION ═══════════════════════════════════════════════════════ */
        .pagination-wrapper {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            border-top: 1px solid #f3f4f6;
        }

        .pagination {
            gap: 0.3rem;
            margin: 0;
        }

        .pagination .page-item { margin: 0; }

        .pagination .page-link {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.35rem 0.75rem;
            color: #374151;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
            background: #fff;
        }

        .pagination .page-link:hover {
            background: #f0f9ff;
            border-color: #bfdbfe;
            color: #1e40af;
        }

        .pagination .page-item.active .page-link {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .pagination .page-item.disabled .page-link {
            background: #f9fafb;
            border-color: #e5e7eb;
            color: #d1d5db;
        }

        /* ══ RESPONSIVE ═══════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            main.content {
                margin-left: 0;
                padding: 1.5rem;
            }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .action-buttons { flex-wrap: wrap; }
        }

        .separator { height: 12px; }
    </style>
</head>

<body>

<!-- HEADER + SIDEBAR -->
<div th:replace="~{layout/header :: header}"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>

<main class="content">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h2>
                <i class="bi bi-search"></i>
                Kết quả tìm kiếm khách hàng
            </h2>
            <div class="update-time">Danh sách khách hàng theo điều kiện tìm kiếm</div>
        </div>
        <a th:href="@{/admin/customer/list}" class="btn-back">
            <i class="bi bi-arrow-left"></i>
            Quay lại danh sách
        </a>
    </div>

    <!-- Result Badge -->
    <div class="result-badge">
        <i class="bi bi-check-circle-fill"></i>
        <span>Tìm thấy <strong id="totalElements">0</strong> khách hàng</span>
    </div>

    <!-- Table Card -->
    <div class="table-card">
        <div class="table-header-row">
            <div class="thr-title">
                <i class="bi bi-table"></i>
                Kết quả tìm kiếm
            </div>
        </div>

        <div class="table-responsive">
            <table class="table modern-table">
                <colgroup>
                    <col style="width: 80px">
                    <col style="width: 280px">
                    <col style="width: 180px">
                    <col>
                    <col style="width: 110px">
                </colgroup>
                <thead>
                <tr>
                    <th>Mã KH</th>
                    <th>Tên khách hàng</th>
                    <th>Điện thoại</th>
                    <th>Email</th>
                    <th style="text-align:center;">Hành động</th>
                </tr>
                </thead>
                <tbody id="customerTableBody">
                <!-- Ajax render -->
                </tbody>
            </table>
        </div>

        <!-- Pagination inside card -->
        <div id="pagination"></div>
    </div>

    <!-- Filter Card -->
    <form class="filter-card" th:action="@{/admin/customer/search}" method="get">
        <div class="filter-header">
            <div class="filter-title">
                <i class="bi bi-funnel"></i>
                Bộ lọc tìm kiếm
            </div>
            <button type="button" class="btn-toggle-filter" onclick="toggleFilter()">
                <i class="bi bi-chevron-up"></i>
            </button>
        </div>

        <div class="filter-body" id="filterBody">
            <div class="filter-section-title">
                <i class="bi bi-info-circle"></i> Thông tin khách hàng
            </div>
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Tên khách hàng</label>
                    <input type="text" class="form-control" name="fullName"
                           th:value="${fullName}"
                           placeholder="Nhập tên khách hàng cần tìm...">
                </div>
            </div>

            <div class="filter-actions">
                <button type="button" class="btn-filter btn-reset" onclick="resetFilter()">
                    <i class="bi bi-arrow-clockwise"></i> Reset
                </button>
                <button type="submit" class="btn-filter btn-search">
                    <i class="bi bi-search"></i> Tìm kiếm
                </button>
            </div>
        </div>
    </form>

</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    /* ── Toggle filter ──────────────────────────────────────────────── */
    function toggleFilter() {
        const filterBody = document.getElementById('filterBody');
        const toggleBtn  = document.querySelector('.btn-toggle-filter');
        filterBody.classList.toggle('collapsed');
        toggleBtn.classList.toggle('collapsed');
        localStorage.setItem('filterCollapsed', filterBody.classList.contains('collapsed'));
    }

    document.addEventListener('DOMContentLoaded', function () {
        const filterBody = document.getElementById('filterBody');
        const toggleBtn  = document.querySelector('.btn-toggle-filter');
        if (localStorage.getItem('filterCollapsed') === 'true') {
            filterBody.classList.add('collapsed');
            toggleBtn.classList.add('collapsed');
        }
    });

    function resetFilter() {
        document.querySelectorAll('.filter-card .form-control, .filter-card select')
            .forEach(el => el.value = '');
    }
</script>

<script th:inline="javascript">
    let fullName = /*[[${fullName}]]*/ '';
</script>

<script>
    let currentPage = 1;
    const pageSize  = 5;

    function loadCustomers(page) {
        $.ajax({
            url: "/admin/customer/search/page",
            type: "GET",
            data: { page: page, size: pageSize, fullName: fullName },
            success: function (data) {
                currentPage = page;
                const tbody = $("#customerTableBody");
                tbody.empty();

                $("#totalElements").text(data.totalElements);

                if (data.content.length === 0) {
                    tbody.append(`
                        <tr>
                            <td colspan="5">
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>Không có dữ liệu khách hàng</p>
                                </div>
                            </td>
                        </tr>
                    `);
                    $("#pagination").empty();
                    return;
                }

                $.each(data.content, function (i, customer) {
                    tbody.append(`
                        <tr>
                            <td><span class="customer-id">KH-${customer.id}</span></td>
                            <td><span class="customer-name">${customer.fullName || ''}</span></td>
                            <td>
                                <div class="contact-info">
                                    <i class="bi bi-telephone"></i>
                                    <span>${customer.phone || 'Chưa cập nhật'}</span>
                                </div>
                            </td>
                            <td>
                                <div class="contact-info">
                                    <i class="bi bi-envelope"></i>
                                    <span>${customer.email || 'Chưa cập nhật'}</span>
                                </div>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a href="/admin/customer/${customer.id}" class="btn-action btn-view" title="Xem chi tiết">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a href="#" title="Xóa" class="btn-action btn-delete" data-id="${customer.id}">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `);
                });

                renderPagination(data.totalPages, page);
            },
            error: function () {
                Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Không tải được dữ liệu!' });
            }
        });
    }

    function renderPagination(totalPages, current) {
        const pagination = $("#pagination");
        pagination.empty();
        if (totalPages <= 1) return;

        let html = `<nav class="pagination-wrapper"><ul class="pagination justify-content-center">`;

        html += `<li class="page-item ${current===1?'disabled':''}">
                    <a href="#" class="page-link" onclick="loadCustomers(1); return false;">
                        <i class="bi bi-chevron-double-left"></i>
                    </a>
                 </li>`;

        html += `<li class="page-item ${current===1?'disabled':''}">
                    <a href="#" class="page-link" onclick="loadCustomers(${current-1}); return false;">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                 </li>`;

        const blockSize  = 5;
        const blockStart = Math.floor((current-1)/blockSize)*blockSize + 1;
        let   blockEnd   = Math.min(blockStart + blockSize - 1, totalPages);

        for (let i = blockStart; i <= blockEnd; i++) {
            html += `<li class="page-item ${i===current?'active':''}">
                        <a href="#" class="page-link" onclick="loadCustomers(${i}); return false;">${i}</a>
                     </li>`;
        }

        html += `<li class="page-item ${current===totalPages?'disabled':''}">
                    <a href="#" class="page-link" onclick="loadCustomers(${current+1}); return false;">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                 </li>`;

        html += `<li class="page-item ${current===totalPages?'disabled':''}">
                    <a href="#" class="page-link" onclick="loadCustomers(${totalPages}); return false;">
                        <i class="bi bi-chevron-double-right"></i>
                    </a>
                 </li>`;

        html += `</ul></nav>`;
        pagination.html(html);
    }

    $(document).ready(function () {
        loadCustomers(1);
    });

    // Ajax xóa khách hàng
    $(document).on("click", ".btn-delete", function (e) {
        e.preventDefault();
        const id = $(this).data("id");

        Swal.fire({
            title: 'Xác nhận xóa',
            text: "Bạn có chắc muốn xóa khách hàng này?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Xóa',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: "/admin/customer/delete/" + id,
                    type: "DELETE",
                    success: function () {
                        Swal.fire({
                            icon: 'success', title: 'Thành công',
                            text: 'Xóa khách hàng thành công!',
                            timer: 1500, showConfirmButton: false
                        }).then(() => {
                            window.location.href = "/admin/customer/list";
                        });
                    },
                    error: function (xhr) {
                        const err = xhr.responseJSON;
                        Swal.fire({
                            icon: 'error', title: 'Lỗi',
                            text: err?.message || 'Xóa thất bại!'
                        });
                    }
                });
            }
        });
    });
</script>

</body>
</html>
