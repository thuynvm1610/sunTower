<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SunTower | Kết quả tìm kiếm hợp đồng mua bán</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">

    <style>
        body {
            background: #fafbfc;
            overflow-x: hidden;
        }

        main.content {
            margin-left: 220px;
            padding: 1.5rem 1.5rem;
            margin-top: 72px;
        }

        /* ══ PAGE HEADER ════════════════════════════════════════════════════ */
        .page-header {
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #111827;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-header h2 i {
            color: #3b82f6;
            font-size: 1.2rem;
        }

        .page-header .update-time {
            font-size: 0.8125rem;
            color: #9ca3af;
            margin-top: 0.2rem;
        }

        /* ══ BUTTONS ════════════════════════════════════════════════════════ */
        .btn-back {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-back:hover {
            background: #f9fafb;
            color: #111827;
            border-color: #d1d5db;
            transform: translateY(-1px);
        }

        /* ══ RESULT BADGE ════════════════════════════════════════════════════ */
        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #eff6ff;
            color: #2563eb;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        /* ══ TABLE CARD ══════════════════════════════════════════════════════ */
        .table-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .table-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            background: #fafbfc;
            border-radius: 10px 10px 0 0;
        }

        .table-header-row .thr-title {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.875rem;
            font-weight: 700;
            color: #111827;
        }

        .table-header-row .thr-title i {
            color: #3b82f6;
            font-size: 0.9375rem;
        }

        /* ══ TABLE ═══════════════════════════════════════════════════════════ */
        .modern-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .modern-table thead th {
            background: #f8fafc;
            border: none;
            border-bottom: 1.5px solid #e9ecef;
            padding: 0.5rem 0.875rem;
            font-size: 0.68rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .modern-table tbody td {
            padding: 0.75rem 0.875rem;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
            vertical-align: middle;
            font-size: 0.8125rem;
        }

        .modern-table tbody tr:last-child td {
            border-bottom: none;
        }

        .modern-table tbody tr {
            transition: background 0.15s;
        }

        .modern-table tbody tr:hover {
            background: #f0f9ff;
        }

        /* ══ TABLE CELL STYLES ═══════════════════════════════════════════════ */
        .contract-id {
            font-weight: 700;
            color: #111827;
            font-size: 0.8125rem;
        }

        .customer-name,
        .building-name,
        .staff-name {
            font-weight: 600;
            color: #111827;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            max-height: 2.8em;
        }

        .price-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.78rem;
            white-space: nowrap;
            background: #ecfdf5;
            color: #059669;
        }

        .date-info {
            font-size: 0.775rem;
            color: #6b7280;
            line-height: 1.7;
        }

        .date-info i {
            font-size: 0.7rem;
            margin-right: 3px;
        }

        /* ══ ACTION BUTTONS ══════════════════════════════════════════════════ */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }

        .btn-action {
            width: 30px;
            height: 30px;
            padding: 0;
            border-radius: 7px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.18s;
            text-decoration: none;
        }

        .btn-view {
            background: #eff6ff;
            color: #3b82f6;
        }

        .btn-view:hover {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .btn-edit {
            background: #fffbeb;
            color: #f59e0b;
        }

        .btn-edit:hover {
            background: #fef3c7;
            color: #d97706;
        }

        .btn-delete {
            background: #fef2f2;
            color: #ef4444;
        }

        .btn-delete:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ══ EMPTY STATE ══════════════════════════════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #9ca3af;
        }

        .empty-state i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.75rem;
            color: #d1d5db;
        }

        .empty-state p {
            font-size: 0.875rem;
            margin: 0;
        }

        /* ══ PAGINATION ═══════════════════════════════════════════════════════ */
        .pagination-wrapper {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            border-top: 1px solid #f3f4f6;
        }

        .pagination {
            gap: 0.3rem;
            margin: 0;
        }

        .pagination .page-item {
            margin: 0;
        }

        .pagination .page-link {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.35rem 0.75rem;
            color: #374151;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
            background: #fff;
        }

        .pagination .page-link:hover {
            background: #f0f9ff;
            border-color: #bfdbfe;
            color: #1e40af;
        }

        .pagination .page-item.active .page-link {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .pagination .page-item.disabled .page-link {
            background: #f9fafb;
            border-color: #e5e7eb;
            color: #d1d5db;
        }

        /* ══ FILTER CARD ════════════════════════════════════════════════════ */
        .filter-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0;
            overflow: hidden;
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            transition: border-color 0.2s ease;
        }

        .filter-card:has(.filter-body.collapsed) .filter-header {
            border-bottom-color: transparent;
        }

        .filter-title {
            font-size: 0.8125rem;
            font-weight: 700;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-title i {
            color: #3b82f6;
            font-size: 0.875rem;
        }

        .btn-toggle-filter {
            background: #f3f4f6;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #6b7280;
            font-size: 0.75rem;
        }

        .btn-toggle-filter:hover {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-toggle-filter i {
            transition: transform 0.3s;
        }

        .btn-toggle-filter.collapsed i {
            transform: rotate(180deg);
        }

        .filter-body {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 1;
            padding: 1.25rem 1.5rem;
        }

        .filter-body.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .filter-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .filter-section-title i {
            color: #3b82f6;
            font-size: 0.8rem;
        }

        .filter-card .form-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
            display: block;
        }

        .filter-card .form-control {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.5rem 0.75rem;
            font-size: 0.8125rem;
            color: #374151;
            background: #fff;
            transition: all 0.2s;
            height: auto;
        }

        .filter-card .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .range-inputs {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .range-inputs .form-control {
            flex: 1;
            min-width: 0;
        }

        .range-separator {
            color: #d1d5db;
            font-weight: 600;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .filter-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
        }

        .btn-filter {
            padding: 0.45rem 1rem;
            border-radius: 7px;
            font-weight: 600;
            font-size: 0.8125rem;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-filter.btn-reset {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-filter.btn-reset:hover {
            background: #e5e7eb;
        }

        .btn-filter.btn-search {
            background: #3b82f6;
            color: white;
        }

        .btn-filter.btn-search:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(59, 130, 246, 0.3);
        }

        /* ══ STATUS BADGE ════════════════════════════════════════════════════ */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .status-done {
            background: #ecfdf5;
            color: #059669;
        }

        .status-pending {
            background: #fff7ed;
            color: #ea580c;
        }

        /* ══ RESPONSIVE ═══════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            main.content {
                margin-left: 0;
                padding: 1.5rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .action-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <div th:replace="~{layout/header :: header}"></div>
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <main class="content">

        <!-- ── Page Header ─────────────────────────────────────────────────── -->
        <div class="page-header">
            <div>
                <h2>
                    <i class="bi bi-search"></i>
                    Kết quả tìm kiếm hợp đồng mua bán
                </h2>
                <div class="update-time">Danh sách hợp đồng mua bán theo điều kiện tìm kiếm</div>
            </div>
            <a th:href="@{/admin/sale-contract/list}" class="btn-back">
                <i class="bi bi-arrow-left"></i>
                Quay lại danh sách
            </a>
        </div>

        <!-- ── Result Badge ────────────────────────────────────────────────── -->
        <div class="result-badge">
            <i class="bi bi-check-circle-fill"></i>
            <span>Tìm thấy <strong id="totalElements">0</strong> hợp đồng mua bán</span>
        </div>

        <!-- ── Table Card ──────────────────────────────────────────────────── -->
        <div class="table-card">
            <div class="table-header-row">
                <div class="thr-title">
                    <i class="bi bi-table"></i>
                    Kết quả tìm kiếm
                </div>
            </div>

            <div class="table-responsive">
                <table class="table modern-table">
                    <colgroup>
                        <col style="width: 90px"> <!-- Mã HĐ -->
                        <col style="width: 200px"> <!-- Bất động sản -->
                        <col style="width: 185px"> <!-- Khách hàng -->
                        <col style="width: 165px"> <!-- Nhân viên -->
                        <col style="width: 150px"> <!-- Giá bán -->
                        <col style="width: 110px"> <!-- Ngày ký -->
                        <col style="width: 130px"> <!-- Trạng thái -->
                        <col> <!-- Hành động -->
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Mã HĐ</th>
                            <th>Bất động sản</th>
                            <th>Khách hàng</th>
                            <th>Nhân viên</th>
                            <th>Giá bán</th>
                            <th>Ngày ký</th>
                            <th>Trạng thái</th>
                            <th style="text-align:center;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="saleContractTableBody">
                        <!-- Ajax render -->
                    </tbody>
                </table>
            </div>

            <div id="pagination"></div>
        </div>

        <!-- ── Filter Card ─────────────────────────────────────────────────── -->
        <form class="filter-card" th:action="@{/admin/sale-contract/search}" method="get">
            <div class="filter-header">
                <div class="filter-title">
                    <i class="bi bi-funnel"></i>
                    Bộ lọc tìm kiếm
                </div>
                <button type="button" class="btn-toggle-filter" onclick="toggleFilter()">
                    <i class="bi bi-chevron-up" id="toggleIcon"></i>
                </button>
            </div>

            <div class="filter-body" id="filterBody">
                <!-- Thông tin cơ bản -->
                <div class="filter-section-title">
                    <i class="bi bi-info-circle"></i> Thông tin cơ bản
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Khách hàng</label>
                        <select class="form-control" name="customerId">
                            <option value="">-- Chọn khách hàng --</option>
                            <option th:each="c : ${customers}" th:value="${c.value}" th:text="${c.key}"
                                th:selected="${c.value == filter.customerId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Bất động sản</label>
                        <select class="form-control" name="buildingId">
                            <option value="">-- Chọn bất động sản --</option>
                            <option th:each="b : ${buildings}" th:value="${b.value}" th:text="${b.key}"
                                th:selected="${b.value == filter.buildingId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Nhân viên quản lý</label>
                        <select class="form-control" name="staffId">
                            <option value="">-- Chọn nhân viên --</option>
                            <option th:each="s : ${staffs}" th:value="${s.id}" th:text="${s.fullName}"
                                th:selected="${s.id == filter.staffId}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Giá bán, ngày ký và trạng thái -->
                <div class="filter-section-title">
                    <i class="bi bi-cash-stack"></i> Giá bán, ngày ký và trạng thái
                </div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Giá bán (VNĐ)</label>
                        <div class="range-inputs">
                            <input type="number" class="form-control" name="salePriceFrom"
                                th:value="${filter.salePriceFrom}" placeholder="Từ" min="0">
                            <span class="range-separator">—</span>
                            <input type="number" class="form-control" name="salePriceTo"
                                th:value="${filter.salePriceTo}" placeholder="Đến" min="0">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Ngày ký</label>
                        <div class="range-inputs">
                            <input type="date" class="form-control" name="createdDateFrom"
                                th:value="${filter.createdDateFrom}">
                            <span class="range-separator">—</span>
                            <input type="date" class="form-control" name="createdDateTo"
                                th:value="${filter.createdDateTo}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Trạng thái bàn giao</label>
                        <select class="form-control" name="status">
                            <option value="">-- Tất cả --</option>
                            <option value="0" th:selected="${filter.status != null and filter.status == 0}">Chưa bàn
                                giao</option>
                            <option value="1" th:selected="${filter.status != null and filter.status == 1}">Đã bàn giao
                            </option>
                        </select>
                    </div>
                </div>

                <div class="filter-actions">
                    <button type="button" class="btn-filter btn-reset" onclick="resetFilter()">
                        <i class="bi bi-arrow-clockwise"></i> Reset
                    </button>
                    <button type="submit" class="btn-filter btn-search">
                        <i class="bi bi-search"></i> Tìm kiếm
                    </button>
                </div>
            </div>
        </form>

    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        function toggleFilter() {
            const filterBody = document.getElementById('filterBody');
            const toggleBtn = document.querySelector('.btn-toggle-filter');
            filterBody.classList.toggle('collapsed');
            toggleBtn.classList.toggle('collapsed');
            localStorage.setItem('saleFilterCollapsed', filterBody.classList.contains('collapsed'));
        }

        document.addEventListener('DOMContentLoaded', function () {
            const filterBody = document.getElementById('filterBody');
            const toggleBtn = document.querySelector('.btn-toggle-filter');
            if (localStorage.getItem('saleFilterCollapsed') === 'true') {
                filterBody.classList.add('collapsed');
                toggleBtn.classList.add('collapsed');
            }
        });

        function resetFilter() {
            document.querySelectorAll('.filter-card .form-control, .filter-card select')
                .forEach(el => el.value = '');
        }
    </script>

    <script th:inline="javascript">
        let filter = /*[[${filter}]]*/ {};
        // Normalize status: Thymeleaf có thể serialize thành string, đảm bảo gửi đúng kiểu
        if (filter.status !== null && filter.status !== undefined && filter.status !== '') {
            filter.status = Number(filter.status);
        }
    </script>

    <script>
        let currentPage = 1;
        const pageSize = 5;

        function formatDate(dateString) {
            if (!dateString) return '—';
            const d = new Date(dateString);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        function formatPrice(price) {
            if (price == null) return '—';
            return new Intl.NumberFormat('vi-VN').format(price).replaceAll('.', ',') + ' đ';
        }

        function loadSaleContracts(page) {
            $.ajax({
                url: "/admin/sale-contract/search/page",
                type: "GET",
                data: {
                    page: page,
                    size: pageSize,
                    customerId: filter.customerId,
                    buildingId: filter.buildingId,
                    staffId: filter.staffId,
                    salePriceFrom: filter.salePriceFrom,
                    salePriceTo: filter.salePriceTo,
                    createdDateFrom: filter.createdDateFrom,
                    createdDateTo: filter.createdDateTo,
                    status: filter.status !== undefined && filter.status !== '' ? filter.status : undefined
                },
                success: function (data) {
                    currentPage = page;
                    const tbody = $("#saleContractTableBody");
                    tbody.empty();

                    $("#totalElements").text(data.totalElements);

                    if (data.content.length === 0) {
                        tbody.append(`
                            <tr>
                                <td colspan="8">
                                    <div class="empty-state">
                                        <i class="bi bi-inbox"></i>
                                        <p>Không tìm thấy hợp đồng mua bán nào</p>
                                    </div>
                                </td>
                            </tr>
                        `);
                        $("#pagination").empty();
                        return;
                    }

                    $.each(data.content, function (i, c) {
                        const statusBadge = c.transferDate
                            ? `<span class="status-badge status-done"><i class="bi bi-check-circle-fill"></i> Đã bàn giao</span>`
                            : `<span class="status-badge status-pending"><i class="bi bi-clock"></i> Chưa bàn giao</span>`;
                        tbody.append(`
                            <tr>
                                <td><span class="contract-id">HĐMB-${c.id}</span></td>
                                <td><span class="building-name">${c.building || '—'}</span></td>
                                <td><span class="customer-name">${c.customer || '—'}</span></td>
                                <td><span class="staff-name">${c.staff || '—'}</span></td>
                                <td><span class="price-badge">${formatPrice(c.salePrice)}</span></td>
                                <td>
                                    <div class="date-info">
                                        <div><i class="bi bi-calendar-event"></i>${formatDate(c.createdDate)}</div>
                                    </div>
                                </td>
                                <td>${statusBadge}</td>
                                <td>
                                    <div class="action-buttons">
                                        <a href="/admin/sale-contract/${c.id}" class="btn-action btn-view" title="Xem chi tiết">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a href="/admin/sale-contract/edit/${c.id}" class="btn-action btn-edit" title="Chỉnh sửa">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a href="#" title="Xóa" class="btn-action btn-delete" data-id="${c.id}">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        `);
                    });

                    renderPagination(data.totalPages, page);
                },
                error: function () {
                    Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Không tải được dữ liệu!' });
                }
            });
        }

        function renderPagination(totalPages, current) {
            const pagination = $("#pagination");
            pagination.empty();
            if (totalPages <= 1) return;

            let html = `<nav class="pagination-wrapper"><ul class="pagination justify-content-center">`;

            html += `<li class="page-item ${current === 1 ? 'disabled' : ''}">
                        <a href="#" class="page-link" onclick="loadSaleContracts(1); return false;">
                            <i class="bi bi-chevron-double-left"></i>
                        </a>
                     </li>`;

            html += `<li class="page-item ${current === 1 ? 'disabled' : ''}">
                        <a href="#" class="page-link" onclick="loadSaleContracts(${current - 1}); return false;">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                     </li>`;

            const blockSize = 5;
            const blockStart = Math.floor((current - 1) / blockSize) * blockSize + 1;
            const blockEnd = Math.min(blockStart + blockSize - 1, totalPages);

            for (let i = blockStart; i <= blockEnd; i++) {
                html += `<li class="page-item ${i === current ? 'active' : ''}">
                            <a href="#" class="page-link" onclick="loadSaleContracts(${i}); return false;">${i}</a>
                         </li>`;
            }

            html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}">
                        <a href="#" class="page-link" onclick="loadSaleContracts(${current + 1}); return false;">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                     </li>`;

            html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}">
                        <a href="#" class="page-link" onclick="loadSaleContracts(${totalPages}); return false;">
                            <i class="bi bi-chevron-double-right"></i>
                        </a>
                     </li>`;

            html += `</ul></nav>`;
            pagination.html(html);
        }

        $(document).ready(function () {
            loadSaleContracts(1);
        });

        $(document).on("click", ".btn-delete", function (e) {
            e.preventDefault();
            const id = $(this).data("id");

            Swal.fire({
                title: 'Xác nhận xóa',
                text: "Bạn có chắc muốn xóa hợp đồng mua bán này?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Xóa',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    $.ajax({
                        url: "/admin/sale-contract/delete/" + id,
                        type: "DELETE",
                        success: function () {
                            Swal.fire({
                                icon: 'success', title: 'Thành công',
                                text: 'Xóa hợp đồng mua bán thành công!',
                                timer: 1500, showConfirmButton: false
                            }).then(() => {
                                window.location.href = "/admin/sale-contract/list";
                            });
                        },
                        error: function (xhr) {
                            const err = xhr.responseJSON;
                            Swal.fire({
                                icon: 'error', title: 'Lỗi',
                                text: err?.message || 'Xóa thất bại!'
                            });
                        }
                    });
                }
            });
        });
    </script>

</body>

</html>
