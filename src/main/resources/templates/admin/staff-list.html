<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SunTower | Quản lý Nhân viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        main.content {
            margin-left: 220px;
            padding: 0;
            margin-top: 72px;
        }

        .detail-body {
            padding: 1.5rem;
        }

        /* ══ PAGE HEADER ════════════════════════════════════════════════════ */
        .page-header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .page-header-bar h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #111827;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-header-bar h2 i {
            color: #3b82f6;
            font-size: 1.2rem;
        }

        .page-sub {
            font-size: 0.8125rem;
            color: #9ca3af;
            margin-top: 0.2rem;
        }

        /* ══ HEADER BUTTONS ═════════════════════════════════════════════════ */
        .btn-hd {
            padding: 0.45rem 0.875rem;
            border-radius: 7px;
            font-weight: 600;
            font-size: 0.8125rem;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            text-decoration: none;
            transition: filter 0.15s ease;
        }

        .btn-hd-add {
            background: #3b82f6;
            color: #fff;
        }

        .btn-hd-add:hover {
            filter: brightness(0.93);
            color: #fff;
        }

        /* ══ FILTER CARD ════════════════════════════════════════════════════ */
        .filter-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0;
            overflow: hidden;
            margin-bottom: 0;
        }

        .filter-header {
            display: flex;
            align-items: center;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
        }

        .filter-title {
            font-size: 0.8125rem;
            font-weight: 700;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-title i {
            color: #3b82f6;
            font-size: 0.875rem;
        }

        .filter-body {
            padding: 1.25rem 1.5rem;
        }

        .filter-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .filter-section-title i {
            color: #3b82f6;
            font-size: 0.8rem;
        }

        .filter-card .form-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
            display: block;
        }

        .filter-card .form-control,
        .filter-card .form-select {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.5rem 0.75rem;
            font-size: 0.8125rem;
            color: #374151;
            background: #fff;
            transition: all 0.2s;
            height: auto;
        }

        .filter-card .form-control:focus,
        .filter-card .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .filter-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
        }

        .btn-filter {
            padding: 0.45rem 1rem;
            border-radius: 7px;
            font-weight: 600;
            font-size: 0.8125rem;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-filter.btn-reset {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-filter.btn-reset:hover {
            background: #e5e7eb;
        }

        .btn-filter.btn-search {
            background: #3b82f6;
            color: #fff;
        }

        .btn-filter.btn-search:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(59, 130, 246, 0.3);
        }

        /* ══ TABLE CARD ═════════════════════════════════════════════════════ */
        .table-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1.25rem;
        }

        .table-card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            background: #fafbfc;
            font-size: 0.875rem;
            font-weight: 700;
            color: #111827;
        }

        .table-card-header i {
            font-size: 0.9375rem;
        }

        .table-card-header.admin-header {
            background: #fef9ec;
        }

        .table-card-header.admin-header i {
            color: #d97706;
        }

        .table-card-header.staff-header {
            background: #eff6ff;
        }

        .table-card-header.staff-header i {
            color: #2563eb;
        }

        /* ══ TABLE ═══════════════════════════════════════════════════════════ */
        .dash-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
            margin: 0;
        }

        .dash-table thead th {
            background: #f8fafc;
            padding: 0.5rem 1rem;
            font-size: 0.68rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1.5px solid #e9ecef;
            white-space: nowrap;
        }

        .dash-table tbody td {
            padding: 0.75rem 0.875rem;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
            vertical-align: middle;
            font-size: 0.8125rem;
        }

        .dash-table tbody tr:last-child td {
            border-bottom: none;
        }

        .dash-table tbody tr {
            transition: background 0.15s;
        }

        .dash-table tbody tr:hover {
            background: #f0f9ff;
        }

        .staff-id {
            font-weight: 700;
            color: #111827;
            font-size: 0.8125rem;
        }

        .staff-name {
            font-weight: 600;
            color: #111827;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #6b7280;
            font-size: 0.8125rem;
        }

        .contact-info i {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        /* Role badge */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.78rem;
        }

        .role-badge.admin {
            background: #fef3c7;
            color: #78350f;
        }

        .role-badge.staff {
            background: #dbeafe;
            color: #1e3a8a;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
        }

        .btn-action {
            width: 30px;
            height: 30px;
            padding: 0;
            border-radius: 7px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.8rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .btn-action.btn-view {
            background: #eff6ff;
            color: #2563eb;
        }

        .btn-action.btn-view:hover {
            background: #dbeafe;
            transform: translateY(-1px);
        }

        .btn-action.btn-delete {
            background: #fef2f2;
            color: #dc2626;
        }

        .btn-action.btn-delete:hover {
            background: #fee2e2;
            transform: translateY(-1px);
        }

        /* Empty state */
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #9ca3af;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .empty-state i {
            font-size: 2rem;
            color: #d1d5db;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            margin: 0;
            font-size: 0.8125rem;
        }

        /* Pagination */
        .pagination-wrapper {
            margin-top: 0;
            padding: 0.75rem 1.5rem;
            border-top: 1px solid #f3f4f6;
        }

        .pagination {
            gap: 0.3rem;
            margin: 0;
        }

        .pagination .page-item {
            margin: 0;
        }

        .pagination .page-link {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.35rem 0.75rem;
            color: #374151;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
            background: #fff;
        }

        .pagination .page-link:hover {
            background: #f0f9ff;
            border-color: #bfdbfe;
            color: #1e40af;
        }

        .pagination .page-item.active .page-link {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }

        .pagination .page-item.disabled .page-link {
            background: #f9fafb;
            border-color: #e5e7eb;
            color: #d1d5db;
        }

        @media (max-width: 768px) {
            main.content {
                margin-left: 0;
            }

            .detail-body {
                padding: 1rem;
            }

            .page-header-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER + SIDEBAR -->
    <div th:replace="~{layout/header :: header}"></div>
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <main class="content">
        <div class="detail-body">

            <!-- ── Page Header ─────────────────────────────────────────────────── -->
            <div class="page-header-bar">
                <div>
                    <h2>
                        <i class="bi bi-person-badge"></i>
                        Quản lý Nhân viên
                    </h2>
                    <div class="page-sub">Danh sách quản trị viên và nhân viên trong hệ thống</div>
                </div>
                <a th:href="@{/admin/staff/add}" class="btn-hd btn-hd-add">
                    <i class="bi bi-plus-circle"></i>
                    Thêm nhân viên
                </a>
            </div>

            <!-- ── Filter Card ────────────────────────────────────────────────── -->
            <form class="filter-card" th:action="@{/admin/staff/search}" method="get">
                <div class="filter-header">
                    <div class="filter-title">
                        <i class="bi bi-funnel"></i>
                        Bộ lọc tìm kiếm
                    </div>
                </div>
                <div class="filter-body">
                    <div class="filter-section-title">
                        <i class="bi bi-person"></i> Thông tin nhân viên
                    </div>
                    <div class="row g-3">
                        <div class="col-md-5">
                            <label class="form-label">Tên nhân viên</label>
                            <input type="text" class="form-control" name="fullName"
                                placeholder="Nhập tên nhân viên cần tìm...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Vai trò</label>
                            <select class="form-select" name="role">
                                <option value="">-- Tất cả vai trò --</option>
                                <option value="ADMIN">Admin</option>
                                <option value="STAFF">Nhân viên</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button type="reset" class="btn-filter btn-reset">
                            <i class="bi bi-arrow-clockwise"></i> Reset
                        </button>
                        <button type="submit" class="btn-filter btn-search">
                            <i class="bi bi-search"></i> Tìm kiếm
                        </button>
                    </div>
                </div>
            </form>

            <!-- ── Admin Table ────────────────────────────────────────────────── -->
            <div class="table-card">
                <div class="table-card-header admin-header">
                    <i class="bi bi-shield-check"></i>
                    Quản trị viên
                </div>
                <div class="table-responsive">
                    <table class="dash-table">
                        <thead>
                            <tr>
                                <th style="width: 11%;">Mã NV</th>
                                <th style="width: 28%;">Tên nhân viên</th>
                                <th style="width: 21%;">Điện thoại</th>
                                <th style="width: 25%;">Email</th>
                                <th style="width: 15%; text-align: center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
                <div id="paginationAdmin"></div>
            </div>

            <!-- ── Staff Table ────────────────────────────────────────────────── -->
            <div class="table-card">
                <div class="table-card-header staff-header">
                    <i class="bi bi-people"></i>
                    Nhân viên
                </div>
                <div class="table-responsive">
                    <table class="dash-table">
                        <thead>
                            <tr>
                                <th style="width: 11%;">Mã NV</th>
                                <th style="width: 21%;">Tên nhân viên</th>
                                <th style="width: 28%;">Điện thoại</th>
                                <th style="width: 25%;">Email</th>
                                <th style="width: 15%; text-align: center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="staffTableBody"></tbody>
                    </table>
                </div>
                <div id="paginationStaff"></div>
            </div>

        </div><!-- /detail-body -->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        let currentAdminPage = 1;
        let currentStaffPage = 1;
        const pageSize = 5;

        function loadAdmins(page, event) {
            if (event) event.preventDefault();
            $.ajax({
                url: "/admin/staff/list/page",
                type: "GET",
                data: { page: page, size: pageSize, role: "ADMIN" },
                success: function (data) {
                    currentAdminPage = page;
                    const tbody = $("#adminTableBody");
                    tbody.empty();
                    if (data.content.length === 0) {
                        tbody.append(`<tr><td colspan="5"><div class="empty-state"><i class="bi bi-inbox"></i><p>Không có dữ liệu quản trị viên</p></div></td></tr>`);
                        $("#paginationAdmin").empty();
                        return;
                    }
                    $.each(data.content, function (i, staff) {
                        tbody.append(`
                        <tr>
                            <td><span class="staff-id">NV-${staff.id}</span></td>
                            <td><span class="staff-name">${staff.fullName || ''}</span></td>
                            <td><div class="contact-info"><i class="bi bi-telephone"></i><span>${staff.phone || 'Chưa cập nhật'}</span></div></td>
                            <td><div class="contact-info"><i class="bi bi-envelope"></i><span>${staff.email || 'Chưa cập nhật'}</span></div></td>
                            <td>
                                <div class="action-buttons">
                                    <a href="/admin/staff/${staff.id}" class="btn-action btn-view" title="Xem chi tiết"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn-action btn-delete" data-id="${staff.id}" title="Xóa"><i class="bi bi-trash"></i></a>
                                </div>
                            </td>
                        </tr>
                    `);
                    });
                    renderPagination(data.totalPages, page, 'Admin');
                },
                error: function () {
                    Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Không tải được dữ liệu Admin!' });
                }
            });
        }

        function loadStaffs(page, event) {
            if (event) event.preventDefault();
            $.ajax({
                url: "/admin/staff/list/page",
                type: "GET",
                data: { page: page, size: pageSize, role: "STAFF" },
                success: function (data) {
                    currentStaffPage = page;
                    const tbody = $("#staffTableBody");
                    tbody.empty();
                    if (data.content.length === 0) {
                        tbody.append(`<tr><td colspan="5"><div class="empty-state"><i class="bi bi-inbox"></i><p>Không có dữ liệu nhân viên</p></div></td></tr>`);
                        $("#paginationStaff").empty();
                        return;
                    }
                    $.each(data.content, function (i, staff) {
                        tbody.append(`
                        <tr>
                            <td><span class="staff-id">NV-${staff.id}</span></td>
                            <td><span class="staff-name">${staff.fullName || ''}</span></td>
                            <td><div class="contact-info"><i class="bi bi-telephone"></i><span>${staff.phone || 'Chưa cập nhật'}</span></div></td>
                            <td><div class="contact-info"><i class="bi bi-envelope"></i><span>${staff.email || 'Chưa cập nhật'}</span></div></td>
                            <td>
                                <div class="action-buttons">
                                    <a href="/admin/staff/${staff.id}" class="btn-action btn-view" title="Xem chi tiết"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn-action btn-delete" data-id="${staff.id}" title="Xóa"><i class="bi bi-trash"></i></a>
                                </div>
                            </td>
                        </tr>
                    `);
                    });
                    renderPagination(data.totalPages, page, 'Staff');
                },
                error: function () {
                    Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Không tải được dữ liệu nhân viên!' });
                }
            });
        }

        function renderPagination(totalPages, current, type) {
            const pagination = type === 'Admin' ? $("#paginationAdmin") : $("#paginationStaff");
            const loadFn = type === 'Admin' ? 'loadAdmins' : 'loadStaffs';
            pagination.empty();
            if (totalPages <= 1) return;
            const blockSize = 5;
            const blockStart = Math.floor((current - 1) / blockSize) * blockSize + 1;
            let blockEnd = Math.min(blockStart + blockSize - 1, totalPages);
            let html = `<nav class="pagination-wrapper"><ul class="pagination justify-content-center mb-0">`;
            html += `<li class="page-item ${current === 1 ? 'disabled' : ''}"><a href="#" class="page-link" onclick="${loadFn}(1,event)"><i class="bi bi-chevron-double-left"></i></a></li>`;
            html += `<li class="page-item ${current === 1 ? 'disabled' : ''}"><a href="#" class="page-link" onclick="${loadFn}(${current - 1},event)"><i class="bi bi-chevron-left"></i></a></li>`;
            for (let i = blockStart; i <= blockEnd; i++) {
                html += `<li class="page-item ${i === current ? 'active' : ''}"><a href="#" class="page-link" onclick="${loadFn}(${i},event)">${i}</a></li>`;
            }
            html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}"><a href="#" class="page-link" onclick="${loadFn}(${current + 1},event)"><i class="bi bi-chevron-right"></i></a></li>`;
            html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}"><a href="#" class="page-link" onclick="${loadFn}(${totalPages},event)"><i class="bi bi-chevron-double-right"></i></a></li>`;
            html += `</ul></nav>`;
            pagination.html(html);
        }

        $(document).ready(function () {
            loadAdmins(1);
            loadStaffs(1);

        });

        $(document).on("click", ".btn-delete", function (e) {
            e.preventDefault();
            let id = $(this).data("id");
            Swal.fire({
                title: 'Xác nhận xóa', text: "Bạn có chắc muốn xóa nhân viên này?", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#dc2626', cancelButtonColor: '#6b7280',
                confirmButtonText: 'Xóa', cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    $.ajax({
                        url: "/admin/staff/delete/" + id, type: "DELETE",
                        success: function () {
                            Swal.fire({ icon: 'success', title: 'Thành công', text: 'Xóa nhân viên thành công!', timer: 1500, showConfirmButton: false })
                                .then(() => { window.location.href = "/admin/staff/list"; });
                        },
                        error: function (xhr) {
                            const err = xhr.responseJSON;
                            Swal.fire({ icon: 'error', title: 'Lỗi', text: err?.message || 'Xóa thất bại!' });
                        }
                    });
                }
            });
        });
    </script>
</body>

</html>
