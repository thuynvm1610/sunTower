<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SunTower - Danh Sách Hợp Đồng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #1a1f36;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --surface: #ffffff;
            --bg: #f0f2f7;
            --border: #dde1ec;
            --text: #1a1f36;
            --muted: #6b7280;
            --success: #059669;
            --danger: #dc2626;
            --warn-bg: #fffbeb;
            --warn-border: #f59e0b;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            margin: 0;
        }

        /* ── HEADER ─────────────────────────────────────────────── */
        .header {
            background: var(--primary);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--accent);
        }

        .header-top {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .badge-custom {
            background: var(--accent);
            color: white;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .btn-logout {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.15s, border-color 0.15s;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
            color: white;
        }

        /* ── NAV ─────────────────────────────────────────────────── */
        .nav-custom {
            background: var(--primary);
        }

        .nav-custom .nav-link {
            color: rgba(255, 255, 255, 0.65) !important;
            font-size: 13px;
            font-weight: 500;
            padding: 12px 15px;
            border-bottom: 3px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }

        .nav-custom .nav-link:hover {
            color: white !important;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        .nav-custom .nav-link.active {
            color: white !important;
            font-weight: 700;
            border-bottom-color: var(--accent);
        }

        .nav-custom .dropdown-menu {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            padding: 4px 0;
        }

        .nav-custom .dropdown-item {
            color: var(--text);
            padding: 9px 16px;
            font-size: 13px;
        }

        .nav-custom .dropdown-item:hover {
            background: var(--bg);
            color: var(--accent);
        }

        .nav-custom .dropdown-item i {
            color: var(--accent);
        }

        /* ── PAGE HEADER ─────────────────────────────────────────── */
        .page-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
        }

        .page-header h1 {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            margin: 0 0 1px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .page-header p {
            font-size: 12px;
            color: var(--muted);
            margin: 0;
        }

        /* ── STATS BAR ───────────────────────────────────────────── */
        .stats-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.75rem 1.25rem;
            margin-bottom: 0.875rem;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        .stat-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
        }

        /* ── FILTER ──────────────────────────────────────────────── */
        .filter-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.875rem 1.25rem;
            margin-bottom: 0.875rem;
        }

        .filter-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }

        .filter-title i {
            color: var(--accent);
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 3px;
        }

        .form-select {
            font-size: 13px;
            padding: 0.45rem 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            height: 34px;
        }

        .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            outline: none;
        }


        .btn-filter {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 14px;
            height: 34px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            transition: background 0.15s;
        }

        .btn-filter:hover {
            background: var(--accent-dark);
            color: white;
        }

        .btn-reset {
            background: var(--surface);
            color: var(--muted);
            border: 1.5px solid var(--border);
            padding: 0 14px;
            height: 34px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            transition: background 0.15s;
        }

        .btn-reset:hover {
            background: var(--bg);
            color: var(--text);
        }

        /* ── SEARCH RESULT NOTICE ────────────────────────────────── */
        .total-contract-search {
            background: var(--warn-bg);
            border-left: 4px solid var(--warn-border);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text);
            margin-bottom: 0.875rem;
            display: none;
        }

        .total-contract-search strong {
            color: var(--accent);
        }

        /* ── EMPTY STATE ─────────────────────────────────────────── */
        .empty-state {
            padding: 2.5rem;
            text-align: center;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .empty-state i {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
            color: var(--border);
        }

        .empty-state h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 0.25rem;
        }

        .empty-state p {
            font-size: 13px;
            margin: 0;
        }

        /* ── CONTRACT CONTAINER ──────────────────────────────────── */
        .contract-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.875rem;
            transition: box-shadow 0.15s;
        }

        .contract-container:hover {
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.1);
        }

        /* ── CONTRACT HEADER ─────────────────────────────────────── */
        .contract-header {
            background: var(--primary);
            color: white;
            padding: 0.6rem 0.875rem;
            border-left: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .contract-id {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .contract-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* ── CONTRACT STATUS BADGES ──────────────────────────────── */
        .contract-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-active {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-expired {
            background: #fee2e2;
            color: var(--danger);
        }

        .badge-pending {
            background: #fef9c3;
            color: #b45309;
        }

        /* ── CONTRACT BODY ───────────────────────────────────────── */
        .contract-body {
            padding: 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            border-top: 1px solid var(--border);
        }

        .info-item {
            padding: 0.6rem 0.875rem;
            border-right: 1px solid var(--border);
        }

        .info-item:last-child {
            border-right: none;
        }

        .info-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            margin-bottom: 3px;
        }

        .info-label i {
            color: var(--accent);
            font-size: 12px;
        }

        .info-value {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .info-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .building-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .building-link:hover {
            text-decoration: underline;
        }

        /* ── CONTRACT FOOTER ─────────────────────────────────────── */
        .contract-footer {
            border-top: 1px solid var(--border);
            padding: 0.5rem 0.875rem;
            background: var(--bg);
        }

        .staff-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .staff-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .staff-name i {
            color: var(--accent);
        }

        .staff-contact {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .staff-contact a {
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            transition: color 0.15s;
        }

        .staff-contact a:hover {
            color: var(--accent);
        }

        .staff-contact a i {
            color: var(--accent);
            font-size: 11px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-top py-2">
            <div class="container-fluid px-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div class="logo">SunTower</div>
                    <div class="d-flex align-items-center gap-3">
                        <div class="text-end" style="font-size:13px;">
                            <small class="d-block opacity-75">Xin chào,</small>
                            <strong th:text="${#authentication.name}">Nguyễn Văn A</strong>
                        </div>
                        <span class="badge-custom">Khách hàng</span>
                        <a href="#" class="btn-logout"
                            onclick="event.preventDefault(); document.getElementById('logoutForm').submit();">
                            <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
                        </a>
                        <form id="logoutForm" th:action="@{/auth/logout}" method="post" style="display:none;"></form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="nav-custom">
            <div class="container-fluid px-4">
                <ul class="nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/home}">
                            <i class="bi bi-house-door me-1"></i>Trang chủ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/customer/contracts}">
                            <i class="bi bi-file-text me-1"></i>Hợp đồng
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/invoice/list}">
                            <i class="bi bi-credit-card me-1"></i>Thanh toán
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/building/list}">
                            <i class="bi bi-building me-1"></i>Tòa nhà
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            <i class="bi bi-grid-3x3-gap me-1"></i>Tiện ích
                        </a>
                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item" th:href="@{/customer/transaction/history}">
                                    <i class="bi bi-clock-history me-2"></i>Lịch sử giao dịch
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/customer/service}">
                                    <i class="bi bi-clipboard-check me-2"></i>Dịch vụ
                                </a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/profile}">
                            <i class="bi bi-person-circle me-1"></i>Tài khoản
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Main Container -->
    <div class="container-fluid px-4 py-3">

        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="bi bi-file-text-fill"></i> Danh Sách Hợp Đồng</h1>
            <p>Quản lý tất cả các hợp đồng thuê của bạn</p>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <form id="filterForm">
                <div class="filter-title">
                    <i class="bi bi-funnel-fill"></i>
                    Bộ lọc tìm kiếm
                </div>
                <div class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">
                            <i class="bi bi-building me-1"></i>Tòa nhà
                        </label>
                        <select class="form-select" name="buildingId">
                            <option value="">-- Chọn tòa nhà --</option>
                            <option th:each="b : ${buildings}" th:value="${b.value}" th:text="${b.key}">SunTower
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">
                            <i class="bi bi-info-circle me-1"></i>Trạng thái
                        </label>
                        <select class="form-select" name="status">
                            <option value="">-- Chọn trạng thái --</option>
                            <option value="ACTIVE">Hiệu lực</option>
                            <option value="EXPIRED">Hết hạn</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-filter ms-auto">
                                <i class="bi bi-search"></i> Tìm kiếm
                            </button>
                            <button type="button" class="btn-reset" onclick="resetFilter()">
                                <i class="bi bi-arrow-counterclockwise"></i> Đặt lại
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- Statistics Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" th:text="${totalContracts}">0</div>
                <div class="stat-label">Tổng hợp đồng</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <div class="stat-number" th:text="${activeContracts}">0</div>
                <div class="stat-label">Đang hiệu lực</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <div class="stat-number" th:text="${expiredContracts}">0</div>
                <div class="stat-label">Đã hết hạn</div>
            </div>
        </div>

        <!-- Search Result Notice -->
        <div id="totalContract" class="total-contract-search"></div>

        <!-- Contract Cards -->
        <div id="contractList">
            <!-- Ajax load dữ liệu -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        function loadContracts() {
            $.ajax({
                url: "/customer/contract/search",
                type: "GET",
                data: {
                    buildingId: $("[name='buildingId']").val(),
                    status: $("[name='status']").val()
                },
                success: function (data) {
                    const body = $("#contractList");
                    body.empty();

                    const searchResult = $("#totalContract");

                    if (data.length === 0) {
                        body.append(`
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <h3>Không có hợp đồng nào</h3>
                                <p>Chưa có hợp đồng theo điều kiện tìm kiếm</p>
                            </div>
                        `);
                        searchResult.hide();
                        return;
                    }

                    searchResult.html(`Kết quả tìm kiếm: <strong>${data.length}</strong> hợp đồng`).show();

                    $.each(data, function (i, c) {
                        const statusClass = c.status === "ACTIVE" ? "badge-active" : "badge-expired";
                        const statusIcon = c.status === "ACTIVE" ? "bi-check-circle-fill" : "bi-x-circle-fill";
                        const statusLabel = c.status === "ACTIVE" ? "Hiệu lực" : "Hết hạn";

                        body.append(`
                            <div class="contract-container">
                                <!-- Contract Header -->
                                <div class="contract-header">
                                    <div>
                                        <div class="contract-id">
                                            <i class="bi bi-file-text-fill"></i>
                                            Mã hợp đồng: ${c.id}
                                        </div>
                                        <div class="contract-meta">
                                            <i class="bi bi-calendar-range"></i>
                                            ${c.formattedStartDate} — ${c.formattedEndDate}
                                        </div>
                                    </div>
                                    <span class="contract-status ${statusClass}">
                                        <i class="bi ${statusIcon}"></i> ${statusLabel}
                                    </span>
                                </div>

                                <!-- Contract Body -->
                                <div class="contract-body">
                                    <div class="info-grid">
                                        <div class="info-item">
                                            <div class="info-label"><i class="bi bi-building"></i> Tòa nhà</div>
                                            <div class="info-value">
                                                <a href="/customer/building/list?buildingName=${c.building.name}" class="building-link">
                                                    ${c.building.name}
                                                    <i class="bi bi-box-arrow-up-right" style="font-size:11px;"></i>
                                                </a>
                                            </div>
                                            <div class="info-sub"><i class="bi bi-geo-alt"></i>${c.building.address}</div>
                                        </div>

                                        <div class="info-item">
                                            <div class="info-label"><i class="bi bi-rulers"></i> Diện tích thuê</div>
                                            <div class="info-value">${c.rentArea} m²</div>
                                        </div>

                                        <div class="info-item">
                                            <div class="info-label"><i class="bi bi-tag"></i> Giá thuê/m²</div>
                                            <div class="info-value">${c.rentPrice.toLocaleString('vi-VN')} VNĐ</div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Contract Footer - Staff Info -->
                                <div class="contract-footer">
                                    <div class="staff-info">
                                        <div class="staff-name">
                                            <i class="bi bi-person-badge"></i>
                                            Nhân viên quản lý: <strong>${c.staff.fullName}</strong>
                                        </div>
                                        <div class="staff-contact">
                                            <a href="tel:${c.staff.phone}">
                                                <i class="bi bi-telephone-fill"></i> ${c.staff.phone}
                                            </a>
                                            <a href="mailto:${c.staff.email}">
                                                <i class="bi bi-envelope-fill"></i> ${c.staff.email}
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `);
                    });
                },
                error: function () {
                    alert("Không tải được dữ liệu!");
                }
            });
        }

        function resetFilter() {
            document.querySelectorAll('.form-select').forEach(el => {
                el.value = '';
            });
        }


        $(document).ready(function () {
            loadContracts();
        });

        $("#filterForm").on("submit", function (e) {
            e.preventDefault();
            loadContracts();
        });
    </script>

</body>

</html>
