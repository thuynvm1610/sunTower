<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunTower - Quên mật khẩu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/images/background/background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.38);
            z-index: 0;
        }

        .page-center {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1;
        }

        .forgot-container {
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.28);
            overflow: hidden;
            width: 100%;
            max-width: 860px;
            display: flex;
            min-height: 500px;
            position: relative;
        }

        /* LEFT PANEL */
        .forgot-header-section {
            background: #2d3e8f;
            padding: 50px 40px;
            color: white;
            width: 42%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .forgot-header-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100px;
            height: 100px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.13);
            color: rgba(255, 255, 255, 0.85);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 11px;
            border-radius: 2px;
            margin-bottom: 24px;
            width: fit-content;
        }

        .logo {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .logo-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 28px;
        }

        .divider-line {
            width: 32px;
            height: 2px;
            background: rgba(255, 255, 255, 0.25);
            margin-bottom: 24px;
        }

        .description {
            font-size: 13.5px;
            line-height: 1.75;
            color: rgba(255, 255, 255, 0.6);
            max-width: 220px;
        }

        .left-footer {
            font-size: 11.5px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* RIGHT PANEL */
        .forgot-form-section {
            padding: 50px 48px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 32px;
        }

        .form-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-header p {
            color: #999;
            font-size: 13.5px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #555;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e2e2;
            border-radius: 4px;
            font-size: 14.5px;
            transition: all 0.2s;
            outline: none;
            background: #fafafa;
            color: #1a1a2e;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .form-group input:focus {
            border-color: #2d3e8f;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(45, 62, 143, 0.08);
        }

        .submit-button {
            width: 100%;
            padding: 13px;
            background: #2d3e8f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
            letter-spacing: 0.2px;
        }

        .submit-button:hover {
            background: #253480;
            box-shadow: 0 4px 16px rgba(45, 62, 143, 0.25);
            transform: translateY(-1px);
        }

        .submit-button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .back-to-login {
            text-align: center;
            margin-top: 16px;
        }

        .back-to-login a {
            color: #2d3e8f;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .back-to-login a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .forgot-container {
                flex-direction: column;
                max-width: 420px;
            }

            .forgot-header-section {
                width: 100%;
                padding: 28px 28px;
                min-height: unset;
            }

            .description,
            .divider-line,
            .left-footer {
                display: none;
            }

            .forgot-form-section {
                padding: 32px 28px;
            }
        }
    </style>
</head>

<body>

    <div class="page-center">
        <div class="forgot-container">
            <!-- LEFT -->
            <div class="forgot-header-section">
                <div class="logo-section">
                    <div class="logo-badge">Bất động sản</div>
                    <div class="logo">SunTower</div>
                    <div class="logo-sub">Hệ thống quản lý tích hợp</div>
                    <div class="divider-line"></div>
                    <p class="description">
                        Nền tảng quản lý bất động sản toàn diện dành cho đội ngũ chuyên nghiệp.
                    </p>
                </div>
                <div class="left-footer">© 2026 SunTower. All rights reserved.</div>
            </div>

            <!-- RIGHT -->
            <div class="forgot-form-section">
                <div class="form-header">
                    <h2>Quên mật khẩu</h2>
                    <p>Nhập địa chỉ email của bạn và chúng tôi sẽ gửi liên kết để đặt lại mật khẩu.</p>
                </div>

                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email" required autofocus>
                    </div>

                    <button type="submit" class="submit-button">Gửi yêu cầu</button>
                </form>

                <div class="back-to-login">
                    <a href="/login">← Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        $(document).on("submit", "#forgotForm", function (e) {
            e.preventDefault();

            const email = $("#email").val();

            $.ajax({
                url: "/auth/forgot-password",
                type: "POST",
                data: { email: email },
                success: function () {
                    Swal.fire({
                        icon: 'success',
                        title: 'Thành công',
                        text: 'Link reset mật khẩu đã được gửi!',
                        timer: 1500,
                        showConfirmButton: false
                    });
                },
                error: function (xhr) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Lỗi',
                        text: (xhr.responseJSON && xhr.responseJSON.message)
                            ? xhr.responseJSON.message
                            : 'Email không hợp lệ!'
                    });
                }
            });
        });
    </script>

</body>

</html>
