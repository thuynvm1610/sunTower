<header class="navbar shadow-sm" th:fragment="header">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-text">
            <strong>SunTower</strong>
            <span class="brand-sub">Management</span>
        </div>
    </div>

    <!-- Right: User -->
    <div class="navbar-right">

        <!-- User Info + Avatar -->
        <a th:href="@{/admin/profile}" class="user-block text-decoration-none">
            <div class="user-info">
                <span class="user-greeting">Xin chào,</span>
                <strong class="user-name" th:text="${staffName}">Nguyễn Văn Minh Thủy</strong>
            </div>
            <div class="avatar-wrapper">
                <img th:src="@{'/images/staff_img/' + ${staffAvatar} + '.jpg'}" alt="Admin Avatar">
                <span class="status-indicator"></span>
            </div>
        </a>

    </div>
</header>
