<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SunTower - Đang chuyển hướng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #2d3e8f;
            --primary-light: #4a5fc1;
            --bg: #f4f7fb;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bridge-card {
            width: min(520px, calc(100vw - 32px));
            background: #fff;
            border-radius: 20px;
            padding: 36px 28px;
            box-shadow: 0 20px 70px rgba(45, 62, 143, 0.12);
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: rgba(45, 62, 143, 0.08);
            color: var(--primary-color);
            margin-bottom: 18px;
            font-size: 30px;
        }

        .title {
            color: #111827;
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .spinner-border {
            color: var(--primary-color);
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>

<body>
    <div class="bridge-card">
        <div class="brand">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <div class="title">Đang đăng nhập</div>
        <div class="subtitle">Hệ thống đã xác thực thành công. Đang chuyển đến trang phù hợp...</div>
        <div class="spinner-border" role="status" aria-label="Loading"></div>
        <input type="hidden" id="targetPath" th:value="${target}" />
    </div>

    <script>
        (function () {
            const target = document.getElementById('targetPath').value || '/login';
            setTimeout(function () {
                window.location.replace(target);
            }, 250);
        })();
    </script>
</body>

</html>
