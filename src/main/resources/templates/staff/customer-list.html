<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunTower - Quản lý Khách hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #3b6ef0;
      --primary-lt: #5b89ff;
      --primary-bg: #eef2ff;
      --bg: #f0f4fb;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --border: #e4e9f2;
      --text: #1a2236;
      --muted: #7a87a0;
      --accent: #e8f0fe;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: #d0d8ea;
      border-radius: 3px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 1px 8px rgba(59, 110, 240, .06);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.01em;
      color: var(--primary);
    }

    .btn-logout {
      background: var(--primary-bg);
      color: var(--primary);
      border: none;
      padding: 7px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: .03em;
      transition: .2s;
    }

    .btn-logout:hover {
      background: var(--primary);
      color: #fff;
    }

    .nav-custom {
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .nav-custom .nav-link {
      color: var(--muted) !important;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 12px 16px;
      border-bottom: 2px solid transparent;
      transition: .2s;
    }

    .nav-custom .nav-link:hover {
      color: var(--primary) !important;
      border-bottom-color: rgba(59, 110, 240, .3);
    }

    .nav-custom .nav-link.active {
      color: var(--primary) !important;
      border-bottom-color: var(--primary);
    }

    .nav-item {
      margin-right: 2px;
    }

    .header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      transition: .25s;
      cursor: pointer;
    }

    .header-avatar:hover {
      transform: scale(1.08);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--accent);
    }

    /* ── Page header ── */
    .page-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: 12px;
      padding: 0.65rem 1rem !important;
      box-shadow: 0 2px 12px rgba(59, 110, 240, .06);
    }

    .page-header h1 {
      color: var(--text);
      font-size: 15px !important;
      font-weight: 700;
      margin-bottom: 0.1rem !important;
    }

    .page-header p {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Filter card ── */
    .filter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.85rem 1rem !important;
      box-shadow: 0 2px 12px rgba(59, 110, 240, .06);
    }

    .filter-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .filter-card .form-control,
    .filter-card .form-select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      padding: 6px 10px;
      height: 34px;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: .15s;
    }

    .filter-card .form-control:focus,
    .filter-card .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 110, 240, .1);
      background: white;
    }

    .btn-filter {
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 34px;
      letter-spacing: .03em;
      transition: .2s;
    }

    .btn-filter.btn-reset {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-filter.btn-reset:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn-filter.btn-search {
      background: linear-gradient(135deg, var(--primary), var(--primary-lt));
      color: white;
    }

    .btn-filter.btn-search:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(59, 110, 240, .3);
    }

    /* ── Section card ── */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(59, 110, 240, .06);
    }

    .section-header {
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 13px;
      color: var(--text);
      font-weight: 700;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .section-header h2 i {
      color: var(--primary);
    }

    /* ── Table ── */
    .modern-table {
      margin: 0;
      min-height: 300px;
    }

    .modern-table thead th {
      background: var(--surface2);
      border: none;
      border-bottom: 1px solid var(--border);
      padding: .5rem .75rem;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      height: 38px;
    }

    .modern-table tbody {
      min-height: 260px;
      display: table-row-group;
    }

    .modern-table tbody td {
      position: relative;
      padding: .5rem .75rem;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }

    .modern-table tbody tr {
      height: 52px;
      min-height: 52px;
      transition: background .15s;
    }

    .modern-table tbody tr:last-child td {
      border-bottom: none;
    }

    .modern-table tbody tr:hover {
      background: var(--surface2);
    }

    .table-responsive {
      min-height: 300px;
    }

    /* Table cells */
    .customer-id {
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .customer-name {
      font-weight: 600;
      color: var(--text);
    }

    .contact-info {
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--text);
    }

    .contact-info i {
      color: var(--muted);
      font-size: 13px;
    }

    /* Action buttons */
    .action-buttons {
      display: flex;
      gap: .5rem;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .btn-action {
      width: 28px;
      height: 26px;
      padding: 0;
      border-radius: 6px;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: .15s;
      font-size: 13px;
    }

    .btn-action.btn-view {
      background: var(--primary-bg);
      color: var(--primary);
    }

    .btn-action.btn-view:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }

    /* Empty state */
    .empty-state {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .empty-state i {
      font-size: 2rem;
      color: var(--border);
      margin-bottom: .5rem;
    }

    .empty-state p {
      margin: 0;
      font-size: 13px;
    }

    /* Pagination */
    .pagination-wrapper {
      margin-top: 1rem;
    }

    .pagination {
      gap: .35rem;
    }

    .pagination .page-link {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--text);
      font-weight: 600;
      font-size: 12px;
      transition: .2s;
      background: var(--surface);
    }

    .pagination .page-link:hover {
      background: var(--primary-bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    .pagination .page-item.active .page-link {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .pagination .page-item.disabled .page-link {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .container-fluid {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .action-buttons {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <!-- ════ HEADER ════ -->
  <div class="header">
    <div class="py-2">
      <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center">
          <div class="logo">SunTower</div>
          <div class="d-flex align-items-center gap-3">
            <div class="text-end d-none d-sm-block">
              <small class="d-block" style="font-size:11px;color:var(--muted);">Xin chào,</small>
              <strong style="font-size:13px;color:var(--text);" th:text="${staffName}">Nguyễn Văn B</strong>
            </div>
            <a th:href="@{/staff/profile}" class="text-decoration-none">
              <img id="headerAvatar" th:src="@{'/images/staff_img/' + ${staffAvatar}}"
                onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23c5cae9%22/%3E%3Ccircle cx=%2250%22 cy=%2238%22 r=%2218%22 fill=%22%235c6bc0%22/%3E%3Ccircle cx=%2250%22 cy=%2290%22 r=%2230%22 fill=%22%235c6bc0%22/%3E%3C/svg%3E'"
                alt="Avatar" class="header-avatar">
            </a>
            <a href="#" class="btn btn-logout"
              onclick="event.preventDefault(); document.getElementById('logoutForm').submit();">Đăng xuất</a>
            <form id="logoutForm" th:action="@{/auth/logout}" method="post" style="display:none;"></form>
          </div>
        </div>
      </div>
    </div>
    <nav class="nav-custom">
      <div class="container-fluid px-4">
        <ul class="nav">
          <li class="nav-item"><a class="nav-link" href="/staff/dashboard"><i class="bi bi-speedometer2 me-1"></i>Tổng
              quan</a></li>
          <li class="nav-item"><a class="nav-link" href="/staff/buildings"><i class="bi bi-building me-1"></i>Tòa
              nhà</a></li>
          <li class="nav-item"><a class="nav-link" href="/staff/contracts"><i class="bi bi-file-text me-1"></i>Hợp
              đồng</a></li>
          <li class="nav-item"><a class="nav-link active" href="/staff/customers"><i class="bi bi-people me-1"></i>Khách
              hàng</a></li>
          <li class="nav-item"><a class="nav-link" href="/staff/invoices"><i class="bi bi-receipt me-1"></i>Hóa đơn</a>
          </li>
          <li class="nav-item"><a class="nav-link" href="/staff/profile"><i class="bi bi-person-circle me-1"></i>Tài
              khoản</a></li>
        </ul>
      </div>
    </nav>
  </div>

  <div class="container-fluid px-4 py-4">
    <div class="page-header rounded mb-3">
      <h1 class="mb-0">Quản lý Khách hàng</h1>
      <p class="text-muted mb-0">Danh sách các khách hàng đang được phân công quản lý</p>
    </div>

    <!-- Filter Card -->
    <form class="filter-card mb-3" id="filterForm">
      <div class="d-flex align-items-end gap-2">
        <div style="flex:1; max-width:360px;">
          <div class="filter-label">Tên khách hàng</div>
          <input type="text" class="form-control" name="fullName" placeholder="Nhập tên khách hàng cần tìm...">
        </div>
        <div class="d-flex gap-1">
          <button type="button" class="btn-filter btn-reset" onclick="resetFilter()"><i
              class="bi bi-arrow-clockwise"></i> Đặt lại</button>
          <button type="submit" class="btn-filter btn-search"><i class="bi bi-search"></i> Tìm</button>
        </div>
      </div>
    </form>

    <!-- Table Card -->
    <div class="section-card p-3">
      <div class="section-header mb-3">
        <h2><i class="bi bi-people me-2"></i>Danh sách khách hàng</h2>
      </div>

      <div class="table-responsive">
        <table class="table modern-table">
          <thead>
            <tr>
              <th style="width: 8%;">Mã KH</th>
              <th style="width: 20%;">Tên khách hàng</th>
              <th style="width: 14%;">Tên đăng nhập</th>
              <th style="width: 14%;">Điện thoại</th>
              <th style="width: 22%;">Email</th>
              <th style="width: 12%;">Mã số thuế</th>
            </tr>
          </thead>

          <tbody id="customerTableBody">
            <!-- Dữ liệu sẽ được Ajax thêm vào -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination"></div>

    <!-- Modal Chi Tiết Khách hàng -->
    <div id="modalContainer">
      <!-- Ajax tải dữ liệu -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>

  </script>

  <script th:inline="javascript">
    const staffId = /*[[${#authentication.principal.userId}]]*/ null;
  </script>

  <script>
    let currentPage = 1;
    const pageSize = 5;

    // Hàm load dữ liệu bảng khách hàng bằng Ajax
    function loadCustomers(page, event) {
      if (event) event.preventDefault();

      $.ajax({
        url: "/staff/customers/search",
        type: "GET",
        data: {
          page: page,
          pageSize: pageSize,
          fullName: $("[name='fullName']").val(),
          staffId: staffId
        },
        success: function (data) {
          currentPage = page;
          const tbody = $("#customerTableBody");
          tbody.empty();
          const modalContainer = $("#modalContainer");
          modalContainer.empty();

          if (data.content.length === 0) {
            tbody.append(`
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>Không có dữ liệu khách hàng</p>
                                </div>
                            </td>
                        </tr>
                    `);
            $("#pagination").empty();
            return;
          }

          $.each(data.content, function (i, customer) {
            tbody.append(`
                        <tr>
                            <td><span class="customer-id">${customer.id}</span></td>
                            <td><span class="customer-name">${customer.fullName || ''}</span></td>
                            <td><span>${customer.username || 'Chưa cập nhật'}</span></td>
                            <td>
                                <div class="contact-info">
                                    <i class="bi bi-telephone"></i>
                                    <span>${customer.phone || 'Chưa cập nhật'}</span>
                                </div>
                            </td>
                            <td>
                                <div class="contact-info">
                                    <i class="bi bi-envelope"></i>
                                    <span>${customer.email || 'Chưa cập nhật'}</span>
                                </div>
                            </td>
                            <td><span>${customer.taxCode || 'Chưa cập nhật'}</span></td>
                        </tr>
                    `);

            // Tạo modal chi tiết
            modalContainer.append(`
                        <div class="modal fade" id="customerModal-${i}" tabindex="-1" aria-labelledby="modalLabel-${i}" aria-hidden="true">
                            <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                                <div class="modal-content" style="border-radius:16px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(59,110,240,.12);background:var(--surface);">

                                    <!-- Modal Header -->
                                    <div class="modal-header" style="background:linear-gradient(135deg,#3b6ef0,#5b89ff);color:white;border-radius:16px 16px 0 0;padding:1rem 1.25rem;border-bottom:none;">
                                        <div>
                                            <h5 class="modal-title fw-bold mb-1" id="modalLabel-${i}" style="font-size:14px;letter-spacing:.02em;">
                                                <i class="bi bi-person-circle me-2"></i>Chi tiết khách hàng
                                            </h5>
                                            <small style="opacity: 0.9;">Mã khách hàng: KH-${customer.id}</small>
                                        </div>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>

                                    <!-- Modal Body -->
                                    <div class="modal-body" style="padding: 1.5rem;">

                                        <!-- Thông tin cá nhân -->
                                        <div class="info-section mb-4">
                                            <h6 class="section-title mb-3" style="color:var(--text);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);padding-bottom:.5rem;display:flex;align-items:center;gap:.4rem;">
                                                <i class="bi bi-person-badge" style="color:var(--primary);"></i>Thông tin cá nhân
                                            </h6>
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <div class="info-item">
                                                        <label style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:.25rem;">Họ và tên</label>
                                                        <p style="font-size:14px;color:var(--text);font-weight:600;margin:0;">${customer.fullName || 'N/A'}</p>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="info-item">
                                                        <label style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:.25rem;">Số điện thoại</label>
                                                        <p style="font-size:14px;color:var(--text);font-weight:600;margin:0;">
                                                            <i class="bi bi-telephone me-1" style="color:var(--primary);"></i>${customer.phone || 'N/A'}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div class="col-12">
                                                    <div class="info-item">
                                                        <label style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:.25rem;">Email</label>
                                                        <p style="font-size:14px;color:var(--text);font-weight:600;margin:0;">
                                                            <i class="bi bi-envelope me-1" style="color:var(--primary);"></i>${customer.email || 'N/A'}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Thông tin liên hệ khác -->
                                        <div class="info-section">
                                            <h6 class="section-title mb-3" style="color:var(--text);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);padding-bottom:.5rem;display:flex;align-items:center;gap:.4rem;">
                                                <i class="bi bi-info-circle" style="color:var(--primary);"></i>Thông tin bổ sung
                                            </h6>
                                            <div class="alert alert-info" role="alert" style="border-radius:10px;border:1px solid var(--border);border-left:4px solid var(--primary);background:var(--primary-bg);color:var(--text);font-size:13px;">
                                                <i class="bi bi-info-circle me-2" style="color:var(--primary);"></i>
                                                Khách hàng đang được quản lý bởi nhân viên của bạn
                                            </div>
                                        </div>

                                    </div>

                                    <!-- Modal Footer -->
                                    <div class="modal-footer" style="background:var(--surface2);border-top:1px solid var(--border);padding:.75rem 1.5rem;border-radius:0 0 16px 16px;">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="padding:.45rem 1.25rem;border-radius:8px;font-weight:600;font-size:13px;background:transparent;color:var(--muted);border:1px solid var(--border);">
                                            <i class="bi bi-x-circle me-1"></i>Đóng
                                        </button>
                                    </div>

                                </div>
                            </div>
                        </div>
                    `);
          });

          renderPagination(data.totalPages, page);
        },
        error: function () {
          alert("Không tải được dữ liệu!");
        }
      });
    }

    // Hàm render phân trang Bootstrap
    function renderPagination(totalPages, current) {
      const pagination = $("#pagination");
      pagination.empty();

      if (totalPages <= 1) return;

      let html = `
            <nav class="pagination-wrapper">
                <ul class="pagination justify-content-center">
        `;

      // Nút "First"
      html += `
            <li class="page-item ${current === 1 ? 'disabled' : ''}">
                <a href="#" class="page-link" onclick="loadCustomers(1, event)">First</a>
            </li>
        `;

      // Nút "Previous"
      html += `
            <li class="page-item ${current === 1 ? 'disabled' : ''}">
                <a href="#" class="page-link" onclick="loadCustomers(${current - 1}, event)">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
        `;

      // Các trang số
      const blockSize = 5;
      const blockStart = Math.floor((current - 1) / blockSize) * blockSize + 1;
      let blockEnd = blockStart + blockSize - 1;
      if (blockEnd > totalPages) blockEnd = totalPages;

      for (let i = blockStart; i <= blockEnd; i++) {
        html += `
                <li class="page-item ${i === current ? 'active' : ''}">
                    <a href="#" class="page-link" onclick="loadCustomers(${i}, event)">${i}</a>
                </li>
            `;
      }

      // Nút "Next"
      html += `
            <li class="page-item ${current === totalPages ? 'disabled' : ''}">
                <a href="#" class="page-link" onclick="loadCustomers(${current + 1}, event)">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        `;

      // Nút "Last"
      html += `
            <li class="page-item ${current === totalPages ? 'disabled' : ''}">
                <a href="#" class="page-link" onclick="loadCustomers(${totalPages}, event)">Last</a>
            </li>
        `;

      html += `
                </ul>
            </nav>
        `;

      pagination.html(html);
    }

    // Khi trang load, gọi Ajax lần đầu
    $(document).ready(function () {
      loadCustomers(1);

      // Hàm highlight trường có giá trị
      function highlightFilledInputs() {
        $('.filter-card .form-control').each(function () {
          const $input = $(this);
          if ($input.val() && $input.val().trim() !== '') {
            $input.addClass('has-value');
          } else {
            $input.removeClass('has-value');
          }
        });
      }

      // Highlight các trường đã có giá trị khi load trang
      highlightFilledInputs();

      // Lắng nghe sự kiện input/change để highlight real-time
      $('.filter-card .form-control').on('input change', function () {
        const $this = $(this);
        if ($this.val() && $this.val().trim() !== '') {
          $this.addClass('has-value');
        } else {
          $this.removeClass('has-value');
        }
      });

      // Reset highlight khi reset form
      $('.btn-filter.btn-reset').on('click', function () {
        setTimeout(function () {
          $('.filter-card .form-control').removeClass('has-value');
        }, 10);
      });
    });

    // Submit form tìm kiếm
    $("#filterForm").on("submit", function (e) {
      e.preventDefault();
      loadCustomers(1);
    });

    function resetFilter() {
      document.querySelectorAll('.form-control, .form-select').forEach(input => {
        input.value = '';
      });

      setTimeout(function () {
        $('.filter-card .form-control').removeClass('has-value');
      }, 10);

      loadCustomers(1);
    }

    // Hàm mở modal
    function openModal(modalId) {
      const modalElement = document.getElementById(modalId);
      if (modalElement) {
        const modal = new bootstrap.Modal(modalElement);
        modal.show();
      }
    }
  </script>
</body>
